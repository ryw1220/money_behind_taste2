<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돈의 지도 — Money Behind Taste</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>


:root {
  --paper: #ffffff;
  --paper-2: #f5f5f5;
  --paper-3: #fafafa;
  --ink: #131210;
  --ink-2: #2a2824;
  --ink-mute: #6b6760;
  --rule: #e5e5e5;
  --rule-soft: #eeeeee;
  --accent: #b5321a;
  --accent-2: #1d3d2f;
  --gold: #a6803a;

  --serif-en: 'Playfair Display', 'Gowun Batang', serif;
  --serif-kr: 'Gowun Batang', 'Nanum Myeongjo', serif;
  --sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;

  --max: 1280px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body { background: var(--paper); color: var(--ink); }

body {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* paper grain */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(120,90,60,.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(60,50,40,.04) 0%, transparent 40%);
  mix-blend-mode: multiply;
}

/* ── TOP NAV ── */
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: rgba(19,18,16,0.96);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.topbar .brand-mark { border-color: rgba(255,255,255,0.7); color: #fff; }
.topbar .brand-text { color: #fff; }
.topbar .brand-text em { color: rgba(255,255,255,0.45); }
.topbar .nav-tab { color: rgba(255,255,255,0.5); }
.topbar .nav-tab:hover { color: #fff; }
.topbar .nav-tab.active { background: #fff; color: #131210; }
.topbar .nav-issue { color: rgba(255,255,255,0.35); }
.topbar-inner {
  max-width: var(--max);
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  gap: 16px;
  position: relative;
}
.topbar-inner .nav-tabs {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.brand {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.brand-mark {
  width: 30px; height: 30px;
  border: 1.5px solid var(--ink);
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: var(--serif-en);
  font-style: italic;
  font-weight: 700;
  font-size: 15px;
}
.brand-text {
  font-family: var(--serif-kr);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -.01em;
}
.brand-text em {
  font-family: var(--serif-en);
  font-style: italic;
  font-weight: 500;
  color: var(--ink-mute);
  margin-left: 6px;
  font-size: 12px;
  letter-spacing: .05em;
}
.nav-tabs {
  display: flex;
  gap: 4px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
}
.nav-tab {
  padding: 6px 12px;
  border-radius: 999px;
  color: var(--ink-mute);
  transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active {
  background: var(--ink);
  color: var(--paper-3);
}
.nav-issue {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: .08em;
}
@media (max-width: 720px) {
  .nav-issue { display: none; }
  .nav-tabs { gap: 0; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { padding: 5px 10px; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
  .topbar-inner { flex-direction: column; align-items: flex-start; gap: 8px; padding: 10px 16px; }
  .topbar-inner .nav-tabs { position: static; left: auto; transform: none; width: 100%; display: flex; }
  .brand-text em { display: none; }
}

/* ── LAYOUT ── */
.view { max-width: var(--max); margin: 0 auto; padding: 0 20px 80px; }
.view-narrow { max-width: 780px; }

/* ── COVER ── */
.cover {
  position: relative;
  border-bottom: 1px solid var(--ink);
  padding: 56px 0 44px;
}
.cover-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--ink-mute);
  text-transform: uppercase;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 40px;
}
.cover-meta .issue { color: var(--accent); font-weight: 600; }
.cover-title {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
  font-weight: 300;
  font-size: clamp(38px, 7vw, 88px);
  line-height: 1.08;
  letter-spacing: -.04em;
  margin-bottom: 36px;
}
.cover-title .em {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
  font-style: normal;
  font-weight: 300;
  letter-spacing: -.04em;
}
.cover-title .sm {
  display: block;
  font-family: var(--serif-en);
  font-style: italic;
  font-weight: 400;
  font-size: clamp(18px, 3vw, 28px);
  color: var(--ink-mute);
  margin-top: 16px;
  letter-spacing: 0;
}
.cover-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 40px;
  padding-top: 32px;
  border-top: 1px solid var(--rule);
}
@media (max-width: 720px) {
  .cover-grid { grid-template-columns: 1fr; gap: 24px; }
}
.cover-lede {
  font-family: var(--serif-kr);
  font-size: clamp(17px, 2.2vw, 22px);
  line-height: 1.5;
  color: var(--ink-2);
  font-weight: 400;
  max-width: 62ch;
}
.cover-lede b { font-weight: 700; color: var(--ink); }
.cover-stats {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-left: 24px;
  border-left: 1px solid var(--rule);
}
@media (max-width: 720px) {
  .cover-stats { padding-left: 0; border-left: 0; border-top: 1px solid var(--rule); padding-top: 20px; }
}
.cover-stat {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.cover-stat-num {
  font-family: var(--serif-en);
  font-size: 36px;
  font-weight: 500;
  letter-spacing: -.02em;
  line-height: 1;
}
.cover-stat-lbl {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink-mute);
  letter-spacing: .05em;
  text-transform: uppercase;
}

/* ── SECTION HEADER ── */
.sh {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 40px 0 20px;
  border-bottom: 1px solid var(--ink);
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 8px;
}
.sh-left {
  display: flex; align-items: baseline; gap: 14px;
}
.sh-num {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 20px;
  color: var(--ink-mute);
  font-weight: 400;
}
.sh-title {
  font-family: var(--serif-kr);
  font-size: clamp(22px, 3vw, 30px);
  font-weight: 700;
  letter-spacing: -.02em;
}
.sh-sub {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .08em;
  color: var(--ink-mute);
  text-transform: uppercase;
}

/* ── INDUSTRY INDEX (cover list) ── */
.industry-index {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0;
}
.ind-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 48px 1fr auto auto;
  align-items: center;
  gap: 16px;
  padding: 18px 4px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background .15s;
}
.ind-row:hover { background: var(--paper-2); }
.ind-row-num {
  font-family: var(--serif-en);
  font-size: 18px;
  color: var(--ink-mute);
  font-weight: 400;
  font-style: italic;
}
.ind-row-name {
  font-family: var(--serif-kr);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.02em;
}
.ind-row-name small {
  display: block;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink-mute);
  font-weight: 400;
  margin-top: 2px;
  letter-spacing: 0;
}
.ind-row-rev {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  text-align: right;
}
.ind-row-rev small { display: block; color: var(--ink-mute); font-size: 10px; margin-top: 2px; }
.ind-row-arrow {
  font-family: var(--serif-en);
  font-size: 18px;
  color: var(--ink-mute);
}
.ind-row:hover .ind-row-arrow { color: var(--accent); transform: translateX(4px); transition: transform .2s; }
@media (max-width: 540px) {
  .ind-row { grid-template-columns: 32px 1fr auto; gap: 12px; padding: 14px 2px; }
  .ind-row-arrow { display: none; }
  .ind-row-name { font-size: 18px; }
  .ind-row-rev { font-size: 12px; }
}

/* ── FEATURED CARDS ── */
.featured-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
  margin-bottom: 24px;
}
.feat-card {
  background: var(--paper-3);
  border: 1px solid var(--rule);
  padding: 24px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 240px;
}
.feat-card:hover { border-color: var(--ink); transform: translateY(-2px); }
.feat-card.large { grid-column: span 6; min-height: 320px; }
.feat-card.med { grid-column: span 6; }
.feat-card.sm { grid-column: span 4; }
.feat-card.half { grid-column: span 6; }
@media (max-width: 900px) {
  .feat-card.large, .feat-card.med, .feat-card.sm, .feat-card.half { grid-column: span 12; }
}
.feat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .14em;
  color: var(--ink-mute);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.feat-label::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
}
.feat-title {
  font-family: var(--serif-kr);
  font-size: 24px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -.02em;
  margin-bottom: 12px;
}
.feat-card.large .feat-title { font-size: 34px; }
.feat-body {
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.6;
  flex: 1;
}
.feat-stat {
  font-family: var(--serif-en);
  font-size: 64px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -.03em;
}
.feat-card.large .feat-stat { font-size: 88px; }
.feat-stat-sub {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink-mute);
  margin-top: 8px;
}
.feat-foot {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--rule);
  display: flex; justify-content: space-between;
}

/* ── INDUSTRY DASHBOARD ── */
.ind-hero {
  padding: 40px 0 32px;
  border-bottom: 1px solid var(--ink);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: end;
}
@media (max-width: 800px) {
  .ind-hero { grid-template-columns: 1fr; gap: 24px; }
}
.ind-hero-back {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  color: var(--ink-mute);
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 20px;
  display: inline-flex;
  gap: 6px;
}
.ind-hero-back:hover { color: var(--accent); }
.ind-hero-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .14em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.ind-hero-title {
  font-family: var(--serif-kr);
  font-size: clamp(40px, 7vw, 80px);
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -.01em;
  margin-bottom: 16px;
}
.ind-hero-sub {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 20px;
  color: var(--ink-mute);
}
.ind-hero-lede {
  font-family: var(--serif-kr);
  font-size: 17px;
  line-height: 1.6;
  color: var(--ink-2);
  max-width: 48ch;
}
.ind-hero-lede .pull {
  display: block;
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 28px;
  line-height: 1.3;
  color: var(--ink);
  margin: 20px 0 12px;
  padding-left: 14px;
  border-left: 2px solid var(--accent);
}

/* KPI strip */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin: 24px 0 32px;
}
.kpi-cell {
  padding: 20px 16px;
  border-right: 1px solid var(--rule);
  display: flex; flex-direction: column; gap: 4px;
}
.kpi-cell:last-child { border-right: 0; }
.kpi-cell-lbl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .1em;
  color: var(--ink-mute);
  text-transform: uppercase;
}
.kpi-cell-val {
  font-family: var(--serif-en);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -.02em;
  line-height: 1.1;
}
.kpi-cell-sub {
  font-size: 11px;
  color: var(--ink-mute);
  font-family: var(--mono);
}
@media (max-width: 720px) {
  .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  .kpi-cell { border-bottom: 1px solid var(--rule); }
  .kpi-cell:nth-child(2) { border-right: 0; }
  .kpi-cell:nth-last-child(-n+2) { border-bottom: 0; }
  .kpi-cell-val { font-size: 24px; }
}

/* ── STORY BLOCKS ── */
.story {
  padding: 40px 0;
  border-bottom: 1px solid var(--rule);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}
@media (max-width: 800px) {
  .story { grid-template-columns: 1fr; gap: 24px; }
}
.story-left .eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.story-title {
  font-family: var(--serif-kr);
  font-size: clamp(24px, 3.5vw, 40px);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -.02em;
  margin-bottom: 20px;
}
.story-body {
  font-family: var(--serif-kr);
  font-size: 16px;
  line-height: 1.75;
  color: var(--ink-2);
  max-width: 46ch;
}
.story-body p + p { margin-top: 1em; text-indent: 1.5em; }
.story-chart {
  background: var(--paper-3);
  border: 1px solid var(--rule);
  padding: 20px;
  min-height: 340px;
  position: relative;
}
.story-chart-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  color: var(--ink-mute);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.story-chart-sub {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-mute);
  margin-bottom: 16px;
}

/* ── COMPANY TABLE / CARDS ── */
.co-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.co-card {
  background: var(--paper-3);
  padding: 20px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 160px;
  border: 1.5px solid var(--rule);
  border-radius: 2px;
}
.co-card:hover { background: var(--paper-2); border-color: var(--rule-soft); }
.co-card.listed {
  border-color: var(--ind-color, #131210);
  border-width: 1.5px;
}
.co-card-listed-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--ind-color, #131210);
  border: 1px solid var(--ind-color, #131210);
  padding: 2px 6px;
  border-radius: 2px;
  margin-top: 2px;
  width: fit-content;
}
.sub-ind-header {
  grid-column: 1 / -1;
  padding: 14px 0 6px;
  border-bottom: 2px solid var(--ind-color, #131210);
  margin-bottom: 4px;
}
.sub-ind-header h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--ind-color, #131210);
  text-transform: uppercase;
}
.sub-ind-header span {
  font-size: 11px;
  color: var(--ink-mute);
  margin-left: 8px;
}
.co-card-rank {
  position: absolute; top: 16px; right: 16px;
  font-family: var(--serif-en); font-style: italic;
  font-size: 14px; color: var(--ink-mute);
}
.co-card-name {
  font-family: var(--serif-kr);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -.01em;
  max-width: calc(100% - 40px);
}
.co-card-sub {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: .02em;
}
.co-card-rev {
  font-family: var(--serif-en);
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -.02em;
  line-height: 1;
  margin-top: auto;
}
.co-card-rev-lbl {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-mute);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-top: 4px;
}
.co-card-meta {
  display: flex; gap: 12px; margin-top: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
}
.co-card-meta .margin { color: var(--accent-2); font-weight: 500; }
.co-card-meta .margin.neg { color: var(--accent); }
.co-card-bar {
  height: 3px;
  background: var(--rule);
  position: relative;
  overflow: hidden;
}
.co-card-bar::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--ind-color, var(--ink));
  width: var(--bar-w, 50%);
}

/* ── COMPANY DETAIL ── */
.co-hero {
  padding: 40px 0 32px;
  border-bottom: 1px solid var(--ink);
}
.co-hero-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.co-hero-meta .crumb { display: flex; gap: 10px; }
.co-hero-meta .crumb span { cursor: pointer; }
.co-hero-meta .crumb span:hover { color: var(--accent); }
.co-hero-meta .crumb em { font-style: normal; color: var(--ink-mute); opacity: .4; }
.co-hero-title {
  font-family: var(--serif-kr);
  font-size: clamp(44px, 8vw, 96px);
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -.01em;
  margin-bottom: 12px;
}
.co-hero-ind {
  font-family: var(--serif-en);
  font-style: italic;
  font-size: 22px;
  color: var(--ink-mute);
  margin-bottom: 32px;
}
.co-detail-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
  margin-top: 32px;
}
.panel {
  background: var(--paper-3);
  border: 1px solid var(--rule);
  padding: 24px;
}
.panel-chart {
  grid-column: span 8;
  min-height: 380px;
}
.panel-stat {

const fmtKRW = (억) => {
  if (억 == null || isNaN(억)) return '—';
  if (Math.abs(억) >= 10000) return (억/10000).toFixed(1).replace(/\.0$/, '') + '조';
  if (Math.abs(억) >= 1000) return Math.round(억).toLocaleString() + '억';
  return Math.round(억).toLocaleString() + '억';
};
// Revenue log-scale tick generator: produces clean, non-overlapping tick values
// lo/hi in 억. Uses 1×, 3× per decade for ≤10조 range; adds 5× per decade for >10조.
const makeRevTickValues = (lo, hi) => {
  const result = [];
  const logLo = Math.floor(Math.log10(Math.max(1, lo)));
  const logHi = Math.ceil(Math.log10(Math.max(1, hi)));
  const useStep5 = hi > 100000; // add 5x ticks only when range extends past 10조
  for (let e = logLo; e <= logHi; e++) {
    const mults = useStep5 ? [1, 3, 5] : [1, 3];
    mults.forEach(m => {
      const v = m * Math.pow(10, e);
      if (v >= lo * 0.85 && v <= hi * 1.15) result.push(v);
    });
  }
  return [...new Set(result)].sort((a, b) => a - b);
};
const fmtPct = (n, sign=false) => {
  if (n == null || isNaN(n)) return '—';
  const v = n.toFixed(1).replace(/\.0$/, '');
  return (sign && n>0?'+':'') + v + '%';
};
const fmtNum = (n) => (n==null||isNaN(n)) ? '—' : Math.round(n).toLocaleString();

const calcMargin = (company, year='2024') => {
  const r = company.revenue?.[year];
  const p = company.profit?.[year];
  if (!r || p == null) return null;
  return (p / r) * 100;
};
const calcGrowth = (company, from='2023', to='2024') => {
  const a = company.revenue?.[from];
  const b = company.revenue?.[to];
  if (!a || !b) return null;
  return ((b - a) / a) * 100;
};

                <div className="feat-foot">
                  <span style={{ color: 'var(--ink-mute)', fontSize: 11 }}>준비중</span>

        <article className="feat-card large"
          style={{ gridColumn: '1 / -1', background: 'var(--ink)', color: 'var(--paper-3)', cursor:'pointer' }}
          onClick={() => setView({ name: 'map' })}>
          <div>
            <div className="feat-label" style={{ color: 'var(--gold)' }}>● FEATURE · 시각화</div>

              433개 기업을 하나의 차트에 놓으면 무엇이 보일까
            </h3>
            <p className="feat-body" style={{ color: 'rgba(255,255,255,.7)' }}>
              가로축은 매출 규모, 세로축은 영업이익률. 산업별로 점이 흩어지는 패턴이 곧 산업의 DNA다.
              4개 사분면에서 <b style={{color:'var(--gold)'}}>'소규모·고마진'</b> 영역에 모이는 기업들이 있다. 그들이 시장을 바꾼다.

          <p className="feat-body">
            매출이 크면 잘 나가는 회사일까. 영업이익률이 높으면 좋은 회사일까.
            같은 산업 안에서도 왜 누군가는 남기고 누군가는 손해를 보는가.
            구조를 보면 답이 나온다.
          </p>

}

window.HomeView = HomeView;
</script>
<script type="text/babel">// Industry dashboard view
function IndustryView({ ikey, data, colors, wows, desc, setView }) {
  const d = data[ikey];
  const color = colors[ikey];
  const narrative = IND_NARRATIVE[ikey] || { tagline: '', lede: '', pull: '', story1: {}, story2: {} };
  const wow = wows[ikey] || {};

  const chartRevRef = useRef(null);
  const chartTrendRef = useRef(null);
  const chartScatterRef = useRef(null);
  const chartSalaryRef = useRef(null);
  const treemapRef = useRef(null);

  // Sort: 상장 우선 → 24년 매출 내림차순 (데이터에 이미 정렬되어 있으므로 그대로 사용)
  const sorted = useMemo(() => {
    const hasSubInd = d.companies.some(c => c.subIndustry);
    if (hasSubInd) {
      // 하위산업 순서: 음료 > 외식 > 식품 (데이터에서 이미 정렬됨)
      return [...d.companies];
    }
    return [...d.companies].sort((a,b) => {
      const la = a.listed ? 0 : 1, lb = b.listed ? 0 : 1;
      if (la !== lb) return la - lb;
      return (b.revenue['2024']||0) - (a.revenue['2024']||0);
    });
  }, [d]);
  const max24 = Math.max(...sorted.map(c => c.revenue['2024']||0), 1);

  // totals
  const total21 = d.companies.reduce((s,c) => s + (c.revenue['2021']||0), 0);
  const total22 = d.companies.reduce((s,c) => s + (c.revenue['2022']||0), 0);
  const total23 = d.companies.reduce((s,c) => s + (c.revenue['2023']||0), 0);
  const total24 = d.total2024;
  const total25 = d.companies.reduce((s,c) => s + (c.revenue['2025']||0), 0);
  const growth23 = total22 ? ((total23 - total22) / total22) * 100 : 0;
  const growth24 = total23 ? ((total24 - total23) / total23) * 100 : 0;

  // avg margin
  const withMargin = d.companies.map(c => calcMargin(c)).filter(m => m != null);
  const avgMargin = withMargin.reduce((s,m) => s+m, 0) / (withMargin.length || 1);

  // top margin company
  const topMarginCo = [...d.companies]
    .filter(c => calcMargin(c) != null && c.revenue['2024'] >= 500)
    .sort((a,b) => calcMargin(b) - calcMargin(a))[0];

  useEffect(() => {
    const charts = [];

    // 1) Revenue trend line (3yr total)
    if (chartRevRef.current) {
      const ctx = chartRevRef.current.getContext('2d');
      charts.push(new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['2021','2022','2023','2024','2025E'],
          datasets: [{
            label: '산업 합산 매출',
            data: [total21||null, total22, total23, total24, total25||null],
            borderColor: color,
            backgroundColor: color + '22',
            fill: true,
            tension: 0.35,
            pointRadius: 6,
            pointBackgroundColor: '#fff',
            pointBorderColor: color,
            pointBorderWidth: 2,
            borderWidth: 2.5,
          }]
        },
        options: commonChartOpts('억원')
      }));
    }

    // 2) Top 10 companies bar (horizontal)
    if (chartTrendRef.current) {
      const top10 = sorted.slice(0, 10);
      const ctx = chartTrendRef.current.getContext('2d');
      charts.push(new Chart(ctx, {
        type: 'bar',
        data: {
          labels: top10.map(c => c.name),
          datasets: [{
            label: '2024 매출',
            data: top10.map(c => c.revenue['2024']),
            backgroundColor: top10.map((c,i) => i===0 ? color : color + '88'),
            borderRadius: 2,
            barThickness: 14,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => '  ' + fmtKRW(ctx.raw) } } },
          scales: {
            x: { grid: { color: '#e4dfd1', drawBorder: false }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, color: '#6b6760', callback: v => fmtKRW(v) } },
            y: { grid: { display: false }, ticks: { font: { family: "'Noto Sans KR'", size: 11, weight: '500' }, color: '#131210' } }
          }
        }
      }));
    }

    // 3) Scatter: revenue × margin
    if (chartScatterRef.current) {
      const points = d.companies
        .map(c => ({ x: c.revenue['2024'], y: calcMargin(c), name: c.name }))
        .filter(p => p.x > 0 && p.y != null && p.y > -50 && p.y < 100);
      const ctx = chartScatterRef.current.getContext('2d');
      charts.push(new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [{
            label: ikey,
            data: points,
            backgroundColor: color + 'aa',
            borderColor: color,
            pointRadius: 6, pointHoverRadius: 9,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#131210',
              titleFont: { family: "'Noto Sans KR'", weight: '700' },
              bodyFont: { family: "'JetBrains Mono'", size: 11 },
              callbacks: {
                title: ctx => ctx[0].raw.name,
                label: ctx => [`매출 ${fmtKRW(ctx.raw.x)}`, `이익률 ${ctx.raw.y.toFixed(1)}%`]
              }
            }
          },
          scales: {
            x: { type: 'logarithmic', grid: { color: '#e4dfd1' }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, color: '#6b6760', callback: v => fmtKRW(v) }, title: { display: true, text: '매출 (로그)', font: { family: "'JetBrains Mono'", size: 10 } } },
            y: { grid: { color: '#e4dfd1' }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, color: '#6b6760', callback: v => v + '%' }, title: { display: true, text: '영업이익률 (%)', font: { family: "'JetBrains Mono'", size: 10 } } }
          }
        }
      }));
    }

    // 4) Treemap - revenue size map
    if (treemapRef.current && typeof d3 !== 'undefined') {
      const el = treemapRef.current;
      el.innerHTML = '';
      const W = el.clientWidth || 700;
      const H = 340;
      const treeData = {
        name: 'root',
        children: sorted.map(c => ({ name: c.name, value: Math.max(c.revenue['2024'] || 0, 1) }))
      };
      const root = d3.hierarchy(treeData).sum(d => d.value).sort((a,b) => b.value - a.value);
      d3.treemap().size([W, H]).padding(2).round(true)(root);
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('width', W); svg.setAttribute('height', H);
      svg.style.display = 'block'; svg.style.borderRadius = '8px';
      const hexToRgb = hex => {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return {r,g,b};
      };
      const rgb = hexToRgb(color.length === 7 ? color : '#7b6cf6');
      root.leaves().forEach((leaf, i) => {
        const w = leaf.x1 - leaf.x0, h = leaf.y1 - leaf.y0;
        if (w < 1 || h < 1) return;
        const alpha = 0.95 - (i / (root.leaves().length || 1)) * 0.55;
        const g = document.createElementNS(svgNS, 'g');
        g.setAttribute('transform', 'translate(' + leaf.x0 + ',' + leaf.y0 + ')');
        const isLargeEnough = w > 40 && h > 22;
        g.style.cursor = isLargeEnough ? 'pointer' : 'default';
        if (isLargeEnough) {
          g.addEventListener('click', () => setView({ name: 'company', industry: ikey, company: leaf.data.name }));
          g.addEventListener('mouseenter', () => { rect.setAttribute('filter', 'brightness(1.12)'); });
          g.addEventListener('mouseleave', () => { rect.removeAttribute('filter'); });
        }
        const rect = document.createElementNS(svgNS, 'rect');
        rect.setAttribute('width', w); rect.setAttribute('height', h);
        rect.setAttribute('rx', 3);
        rect.setAttribute('fill', 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')');
        g.appendChild(rect);
        if (isLargeEnough) {
          const txt = document.createElementNS(svgNS, 'text');
          txt.setAttribute('x', Math.min(w/2, w-4));
          txt.setAttribute('y', h/2 - (w > 70 && h > 40 ? 8 : 0));
          txt.setAttribute('text-anchor', 'middle');
          txt.setAttribute('dominant-baseline', 'middle');
          txt.setAttribute('fill', alpha > 0.5 ? '#fff' : '#131210');
          txt.setAttribute('font-size', Math.min(Math.max(9, w/8), 13) + 'px');
          txt.setAttribute('font-family', "'Noto Sans KR', sans-serif");
          txt.setAttribute('font-weight', '600');
          const maxChars = Math.floor(w / 8);
          const displayName = leaf.data.name.length > maxChars ? leaf.data.name.slice(0, maxChars) + '…' : leaf.data.name;
          txt.textContent = displayName;
          g.appendChild(txt);
          if (w > 70 && h > 40) {
            const val = document.createElementNS(svgNS, 'text');
            val.setAttribute('x', w/2);
            val.setAttribute('y', h/2 + 10);
            val.setAttribute('text-anchor', 'middle');
            val.setAttribute('dominant-baseline', 'middle');
            val.setAttribute('fill', alpha > 0.5 ? 'rgba(255,255,255,0.8)' : '#6b6760');
            val.setAttribute('font-size', '9px');
            val.setAttribute('font-family', "'JetBrains Mono', monospace");
            const rev = leaf.data.value;
            val.textContent = rev >= 10000 ? (rev/10000).toFixed(1) + '조' : rev >= 1000 ? (rev/1000).toFixed(1) + '천억' : rev + '억';
            g.appendChild(val);
          }
        }
        svg.appendChild(g);
      });
      el.appendChild(svg);
    }

    // INSIGHT 03 — 연봉 분포 차트
    if (chartSalaryRef.current) {
      const salaryMap = window.TASTE_SALARY || {};
      const companiesWithSalary = d.companies
        .map(c => ({ name: c.name.length > 6 ? c.name.slice(0,5)+'…' : c.name, sal: salaryMap[c.name] }))
        .filter(c => c.sal)
        .map(c => {
          const yr = ['2025','2024','2023','2022'].find(y => c.sal[y]);
          return yr ? { name: c.name, salary: c.sal[yr], year: yr } : null;
        })
        .filter(Boolean)
        .sort((a,b) => b.salary - a.salary)
        .slice(0, 15);
      if (companiesWithSalary.length > 0) {
        charts.push(new Chart(chartSalaryRef.current.getContext('2d'), {
          type: 'bar',
          data: {
            labels: companiesWithSalary.map(c => c.name),
            datasets: [{
              label: '임원 평균 연봉 (만원)',
              data: companiesWithSalary.map(c => c.salary),
              backgroundColor: color + 'bb',
              borderRadius: 3,
              barThickness: 20,
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { backgroundColor: '#131210', callbacks: { label: ctx => '  ' + (ctx.raw/10000).toFixed(1) + '천만원' } }
            },
            scales: {
              x: { grid: { color: '#e5e5e5' }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, callback: v => (v/10000).toFixed(0) + '천만' } },
              y: { grid: { display: false }, ticks: { font: { family: "'Noto Sans KR'", size: 11 } } }
            }
          }
        }));
      }
    }

    return () => charts.forEach(c => c.destroy());
  }, [ikey]);

  // INSIGHT 03 연봉 분석 텍스트 생성
  const getSalaryInsight = () => {
    const salaryMap = window.TASTE_SALARY || {};
    const salaries = d.companies
      .map(c => { const s = salaryMap[c.name]; if (!s) return null; const yr = ['2025','2024','2023'].find(y => s[y]); return yr ? s[yr] : null; })
      .filter(Boolean);
    if (!salaries.length) return null;
    const avg = Math.round(salaries.reduce((a,b)=>a+b,0)/salaries.length);
    const max = Math.max(...salaries);
    const min = Math.min(...salaries);
    const maxCo = d.companies.find(c => { const s = salaryMap[c.name]; if(!s) return; const yr=['2025','2024','2023'].find(y=>s[y]); return yr && s[yr]===max; });
    const minCo = d.companies.find(c => { const s = salaryMap[c.name]; if(!s) return; const yr=['2025','2024','2023'].find(y=>s[y]); return yr && s[yr]===min; });
    return { avg, max, min, maxCo: maxCo?.name, minCo: minCo?.name, count: salaries.length };
  };
  const salaryInsight = getSalaryInsight();

  return (
    <div className="view">
      {/* Back link */}
      <div style={{ paddingTop: 24 }}>
        <span className="ind-hero-back" onClick={() => setView({ name: 'home' })}>← 목차로</span>
      </div>

      {/* Hero */}
      <header className="ind-hero">
        <div>
          <div className="ind-hero-eyebrow">{narrative.tagline}</div>
          <h1 className="ind-hero-title" style={{ color }}>{ikey}</h1>
          <div className="ind-hero-sub">{desc[ikey]}</div>
        </div>
        <div>
          <p className="ind-hero-lede">
            {narrative.lede}
            <span className="pull" style={{ borderColor: color }}>"{narrative.pull}"</span>
          </p>
        </div>
      </header>

      {/* KPI Strip */}
      <div className="kpi-strip">
        <div className="kpi-cell">
          <span className="kpi-cell-lbl">2024 총매출</span>
          <span className="kpi-cell-val" style={{ color }}>{fmtKRW(total24)}</span>
          <span className="kpi-cell-sub">{d.count}개사 합산</span>
        </div>
        <div className="kpi-cell">
          <span className="kpi-cell-lbl">전년 대비 성장</span>
          <span className="kpi-cell-val" style={{ color: growth24 >= 0 ? 'var(--accent-2)' : 'var(--accent)' }}>
            {fmtPct(growth24, true)}
          </span>
          <span className="kpi-cell-sub">2023→2024</span>
        </div>
        <div className="kpi-cell">
          <span className="kpi-cell-lbl">평균 영업이익률</span>
          <span className="kpi-cell-val">{avgMargin.toFixed(1)}%</span>
          <span className="kpi-cell-sub">{withMargin.length}개사 기준</span>
        </div>
        <div className="kpi-cell">
          <span className="kpi-cell-lbl">대표 기업</span>
          <span className="kpi-cell-val" style={{ fontSize: 22, fontFamily: 'var(--serif-kr)' }}>{sorted[0]?.name}</span>
          <span className="kpi-cell-sub">매출 {fmtKRW(sorted[0]?.revenue['2024'])}</span>
        </div>
      </div>

      {/* Treemap — revenue size map */}
      <section style={{ marginTop: 32 }}>
        <div className="sh">
          <div className="sh-left">
            <span className="sh-num">I.</span>
            <h2 className="sh-title">매출 규모 지도</h2>
          </div>
          <span className="sh-sub">2025E 기준 · 크기 = 매출 규모</span>
        </div>
        <div ref={treemapRef} style={{ width: '100%', borderRadius: 8, overflow: 'hidden', background: 'var(--bg-2, #f7f4ef)' }}></div>
      </section>

      {/* STORY 1 — headline + chart */}
      <div className="story">
        <div className="story-left">
          <div className="eyebrow">INSIGHT · 01</div>
          <h3 className="story-title">{narrative.story1.title || '이 산업의 진짜 이야기'}</h3>
          <div className="story-body">
            <p>{narrative.story1.body || '이 산업의 이익 구조는 매출 규모로만 읽히지 않는다. 옆의 차트는 매출과 이익률의 관계를 보여준다.'}</p>
          </div>
        </div>
        <div className="story-chart">
          <div className="story-chart-title">상위 10개사 매출 규모</div>
          <div className="story-chart-sub">Top 10 by revenue · 2025E</div>
          <div style={{ height: 'calc(100% - 50px)', minHeight: 320 }}>
            <canvas ref={chartTrendRef}></canvas>
          </div>
        </div>
      </div>

      {/* STORY 2 — headline + chart */}
      <div className="story">
        <div className="story-left">
          <div className="eyebrow">INSIGHT · 02</div>
          <h3 className="story-title">{narrative.story2.title || '매출과 이익률, 어디에 회사들이 모여있나'}</h3>
          <div className="story-body">
            <p>{narrative.story2.body || '가로축은 매출 규모, 세로축은 이익률이다. 우측 위로 갈수록 규모와 수익성을 동시에 갖춘 회사다.'}</p>
          </div>
        </div>
        <div className="story-chart">
          <div className="story-chart-title">매출 × 영업이익률</div>
          <div className="story-chart-sub">Scatter · each dot = 1 company</div>
          <div style={{ height: 'calc(100% - 50px)', minHeight: 320 }}>
            <canvas ref={chartScatterRef}></canvas>
          </div>
        </div>
      </div>

      {/* STORY 3 — 연봉 인사이트 */}
      {salaryInsight && (
        <div className="story">
          <div className="story-left">
            <div className="eyebrow">INSIGHT · 03</div>
            <h3 className="story-title">이 산업, 얼마나 버는가</h3>
            <div className="story-body">
              <p>
                {ikey} 산업 임원 평균 연봉은 <strong>{(salaryInsight.avg/10000).toFixed(1)}천만원</strong>이다.
                가장 높은 곳은 <strong>{salaryInsight.maxCo}</strong>({(salaryInsight.max/10000).toFixed(1)}천만원),
                가장 낮은 곳은 <strong>{salaryInsight.minCo}</strong>({(salaryInsight.min/10000).toFixed(1)}천만원)으로
                {' '}{Math.round(salaryInsight.max/salaryInsight.min)}배 차이가 난다.
                매출 규모가 연봉을 보장하지는 않는다. 수익성이 높은 회사일수록 직원에게 더 많이 돌아간다.
              </p>
            </div>
          </div>
          <div className="story-chart">
            <div className="story-chart-title">임원 평균 연봉 순위</div>
            <div className="story-chart-sub">최신 공시 기준 · 상위 15개사</div>
            <div style={{ height: 'calc(100% - 50px)', minHeight: 320 }}>
              <canvas ref={chartSalaryRef}></canvas>
            </div>
          </div>
        </div>
      )}

      {/* Companies grid */}
      <section>
        <div className="sh">
          <div className="sh-left">
            <span className="sh-num">III.</span>
            <h2 className="sh-title">{ikey} 기업</h2>
          </div>
          <span className="sh-sub">{d.count}개사 · 매출 순</span>
        </div>
        <div className="co-grid">
          {(() => {
            const hasSubInd = sorted.some(c => c.subIndustry);
            let lastSub = null;
            const subLabels = { '음료': '음료·카페·주류', '외식': '외식·레스토랑', '식품': '식품·제과·베이커리' };
            return sorted.map((c, i) => {
              const r24 = c.revenue['2024'];
              const m = calcMargin(c);
              const g = calcGrowth(c);
              const barW = Math.max(3, (r24 / max24) * 100);
              const els = [];
              // 하위산업 헤더
              if (hasSubInd && c.subIndustry && c.subIndustry !== lastSub) {
                lastSub = c.subIndustry;
                const subRevTotal = sorted.filter(x => x.subIndustry === c.subIndustry)
                  .reduce((s, x) => s + (x.revenue['2024']||0), 0);
                els.push(
                  <div key={'sub-'+c.subIndustry} className="sub-ind-header" style={{'--ind-color': color}}>
                    <h3>{subLabels[c.subIndustry] || c.subIndustry}
                      <span>{fmtKRW(subRevTotal)} 총매출</span>
                    </h3>
                  </div>
                );
              }
              els.push(
                <article key={c.name} className={'co-card' + (c.listed ? ' listed' : '')}
                  style={{ '--ind-color': color, '--bar-w': barW + '%' }}
                  onClick={() => setView({ name: 'company', industry: ikey, company: c.name })}>
                  <div className="co-card-rank">{String(i+1).padStart(2,'0')}</div>
                  <div>
                    <div className="co-card-name">{c.name}</div>
                    <div className="co-card-sub">{c.industry || desc[ikey]}</div>
                    {c.listed && <div className="co-card-listed-badge">▲ KOSPI/KOSDAQ</div>}
                  </div>
                  <div>
                    <div className="co-card-rev">{fmtKRW(r24)}</div>
                    <div className="co-card-rev-lbl">2024 매출</div>
                  </div>
                  <div className="co-card-bar"></div>
                  <div className="co-card-meta">
                    {m != null && <span className={'margin ' + (m < 0 ? 'neg' : '')}>이익률 {m.toFixed(1)}%</span>}
                    {g != null && <span>{fmtPct(g, true)}</span>}
                  </div>
                </article>
              );
              return els;
            });
          })()}
        </div>
      </section>

      {/* Trend section */}
      <section style={{ marginTop: 40 }}>
        <div className="panel">
          <div className="panel-title">5개년 산업 매출 추이</div>
          <div className="panel-sub">2021 – 2025E · 합산 단위: 억원</div>
          <div style={{ height: 300 }}>
            <canvas ref={chartRevRef}></canvas>
          </div>
        </div>
      </section>
    </div>
  );
}

// shared chart opts
function commonChartOpts(unit) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#131210',
        titleFont: { family: "'Noto Sans KR'", weight: '700' },
        bodyFont: { family: "'JetBrains Mono'", size: 11 },
        padding: 10,
        callbacks: { label: ctx => '  ' + fmtKRW(ctx.raw) }
      }
    },
    scales: {
      x: { grid: { display: false }, ticks: { font: { family: "'JetBrains Mono'", size: 11, weight: '600' }, color: '#131210' } },
      y: { grid: { color: '#e4dfd1', drawBorder: false }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, color: '#6b6760', callback: v => fmtKRW(v) } }
    }
  };
}

window.IndustryView = IndustryView;
window.commonChartOpts = commonChartOpts;
</script>
<script type="text/babel">// Company detail view
function CompanyView({ ikey, cname, data, colors, desc, setView }) {
  const d = data[ikey];
  const color = colors[ikey];
  const company = d.companies.find(c => c.name === cname);

  const chartLineRef = useRef(null);
  const chartBarRef = useRef(null);
  const chartRankRef = useRef(null);
  const chartStockRef = useRef(null);

  if (!company) return <div className="view"><p>기업을 찾을 수 없습니다.</p></div>;

  const r21 = company.revenue['2021'], r22 = company.revenue['2022'], r23 = company.revenue['2023'], r24 = company.revenue['2024'], r25 = company.revenue['2025'];
  const p21 = company.profit?.['2021'], p22 = company.profit?.['2022'], p23 = company.profit?.['2023'], p24 = company.profit?.['2024'], p25 = company.profit?.['2025'];
  const m24 = calcMargin(company, '2024');
  const g24 = calcGrowth(company);
  const g23 = calcGrowth(company, '2022', '2023');

  // 주가 / 연봉 데이터
  const stockInfo = (window.TASTE_STOCK || {})[cname] || null;
  // 최근 3년 주가 상승률 계산
  const threeYearReturn = (() => {
    if (!stockInfo) return null;
    const yp = stockInfo.yearlyPrices || {};
    const years = Object.keys(yp).sort();
    if (years.length < 2) return null;
    const latestYr = years[years.length - 1];
    const baseYr = String(parseInt(latestYr) - 3);
    const pNow = yp[latestYr], pBase = yp[baseYr];
    if (!pNow || !pBase) return null;
    return ((pNow - pBase) / pBase * 100).toFixed(1);
  })();
  const salaryMap = (window.TASTE_SALARY || {})[cname] || null;
  let latestSalary = null, latestSalaryYear = null;
  if (salaryMap) {
    const yrs = ['2025','2024','2023','2022','2021'].filter(y => salaryMap[y]);
    if (yrs.length) { latestSalaryYear = yrs[0]; latestSalary = salaryMap[yrs[0]]; }
  }

  // rank within industry
  const sorted = [...d.companies].sort((a,b) => (b.revenue['2024']||0) - (a.revenue['2024']||0));
  const rank = sorted.findIndex(c => c.name === cname) + 1;

  // narrative
  const getInsight = () => {
    const pieces = [];
    if (m24 != null) {
      if (m24 > 30) pieces.push(`영업이익률 ${m24.toFixed(1)}%는 한국 기업 전체에서 상위 1%에 속한다`);
      else if (m24 > 15) pieces.push(`영업이익률 ${m24.toFixed(1)}%는 동종 산업 평균을 크게 웃돈다`);
      else if (m24 < 0) pieces.push(`${m24.toFixed(1)}% 영업손실은 사업 구조의 재편이 필요하다는 신호다`);
      else if (m24 < 3) pieces.push(`${m24.toFixed(1)}%의 낮은 이익률은 규모 경쟁의 그늘을 보여준다`);
      else pieces.push(`영업이익률 ${m24.toFixed(1)}%는 업계 평균 수준이다`);
    }
    if (g24 != null) {
      if (g24 > 30) pieces.push(`그럼에도 매출은 전년 대비 ${g24.toFixed(0)}% 성장했다`);
      else if (g24 > 10) pieces.push(`매출은 견조하게 ${g24.toFixed(0)}% 증가했다`);
      else if (g24 < -10) pieces.push(`매출이 ${g24.toFixed(0)}% 감소하며 시장 점유를 잃고 있다`);
    }
    if (company.revenuePerEmployee > 10) pieces.push(`1인당 매출 ${company.revenuePerEmployee.toFixed(1)}억은 높은 생산성을 의미한다`);
    return pieces.join('. ') + '.';
  };

  useEffect(() => {
    const charts = [];
    if (chartLineRef.current) {
      charts.push(new Chart(chartLineRef.current.getContext('2d'), {
        type: 'line',
        data: {
          labels: ['2021','2022','2023','2024','2025E'],
          datasets: [
            { label: '매출', data: [r21||null,r22,r23,r24,r25||null], borderColor: color, backgroundColor: color + '22', fill: true, tension: .35, pointRadius: 7, pointBackgroundColor: '#fff', pointBorderColor: color, pointBorderWidth: 2, borderWidth: 3 },
            { label: '영업이익', data: [p21||null,p22,p23,p24,p25||null], borderColor: '#131210', backgroundColor: 'transparent', borderDash: [5,5], tension: .3, pointRadius: 4, pointBackgroundColor: '#131210', borderWidth: 1.5 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { font: { family: "'JetBrains Mono'", size: 11 }, color: '#6b6760', boxWidth: 20, boxHeight: 2 } },
            tooltip: { backgroundColor: '#131210', callbacks: { label: ctx => '  ' + ctx.dataset.label + ': ' + fmtKRW(ctx.raw) } }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: "'JetBrains Mono'", weight: '600' } } },
            y: { grid: { color: '#e4dfd1', drawBorder: false }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, callback: v => fmtKRW(v) } }
          }
        }
      }));
    }
    if (chartBarRef.current) {
      charts.push(new Chart(chartBarRef.current.getContext('2d'), {
        type: 'bar',
        data: {
          labels: ['2021','2022','2023','2024','2025E'],
          datasets: [
            { label: '매출', data: [r21||null,r22,r23,r24,r25||null], backgroundColor: color + 'cc', borderRadius: 2, barThickness: 22 },
            { label: '영업이익', data: [p21||null,p22,p23,p24,p25||null], backgroundColor: '#131210', borderRadius: 2, barThickness: 8 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { font: { family: "'JetBrains Mono'", size: 11 }, color: '#6b6760', boxWidth: 14 } },
            tooltip: { backgroundColor: '#131210', callbacks: { label: ctx => '  ' + ctx.dataset.label + ': ' + fmtKRW(ctx.raw) } }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: "'JetBrains Mono'", weight: '600' } } },
            y: { grid: { color: '#e4dfd1', drawBorder: false }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, callback: v => fmtKRW(v) } }
          }
        }
      }));
    }
    if (chartRankRef.current) {
      const top = sorted.slice(0, 12);
      charts.push(new Chart(chartRankRef.current.getContext('2d'), {
        type: 'bar',
        data: {
          labels: top.map(c => c.name),
          datasets: [{
            label: '2024 매출',
            data: top.map(c => c.revenue['2024']),
            backgroundColor: top.map(c => c.name === cname ? color : color + '44'),
            borderColor: top.map(c => c.name === cname ? '#131210' : 'transparent'),
            borderWidth: 2,
            borderRadius: 2,
            barThickness: 12,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { backgroundColor: '#131210', callbacks: { label: ctx => '  ' + fmtKRW(ctx.raw) } } },
          scales: {
            x: { grid: { color: '#e4dfd1' }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, callback: v => fmtKRW(v) } },
            y: { grid: { display: false }, ticks: { font: { family: "'Noto Sans KR'", size: 11, weight: '500' }, color: '#131210' } }
          }
        }
      }));
    }
    // 주가 차트
    if (chartStockRef.current && stockInfo && Object.keys(stockInfo.monthlyPrices||{}).length > 0) {
      const mp = stockInfo.monthlyPrices;
      const labels = Object.keys(mp).sort();
      const values = labels.map(k => mp[k]);
      charts.push(new Chart(chartStockRef.current.getContext('2d'), {
        type: 'line',
        data: {
          labels: labels.map(l => {
            const mo = parseInt(l.slice(5), 10);
            return mo === 1 ? l.slice(0,4) + '년' : mo + '월';
          }),
          datasets: [{
            label: '주가',
            data: values,
            borderColor: color,
            backgroundColor: color + '18',
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 4,
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { backgroundColor: '#131210', callbacks: { label: ctx => '  ' + ctx.raw.toLocaleString() + '원' } }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: "'JetBrains Mono'", size: 9 }, maxTicksLimit: 12, maxRotation: 0 } },
            y: { grid: { color: '#e5e5e5', drawBorder: false }, ticks: { font: { family: "'JetBrains Mono'", size: 10 }, callback: v => v.toLocaleString()+'원' } }
          }
        }
      }));
    }

    return () => charts.forEach(c => c.destroy());
  }, [ikey, cname]);

  return (
    <div className="view">
      <header className="co-hero">
        <div className="co-hero-meta">
          <div className="crumb">
            <span onClick={() => setView({ name: 'home' })}>목차</span>
            <em>/</em>
            <span onClick={() => setView({ name: 'industry', key: ikey })}>{ikey}</span>
            <em>/</em>
            <span style={{ color: 'var(--ink)' }}>{cname}</span>
          </div>
          <span>NO. {String(rank).padStart(2,'0')} · {ikey}</span>
        </div>
        <h1 className="co-hero-title">{cname}</h1>
        <div className="co-hero-ind">
          <span style={{ color }}>● </span>
          {company.industry || desc[ikey]} 
          {company.founded ? ` · since ${company.founded}` : ''}
          {company.location ? ` · ${company.location}` : ''}
        </div>
      </header>

      {/* Insight banner */}
      <div className="insight" style={{ marginTop: 32 }}>
        <div>
          <div className="insight-label">EDITOR'S NOTE</div>
          <div style={{ fontFamily: 'var(--serif-en)', fontStyle: 'italic', fontSize: 42, color: 'var(--gold)', lineHeight: 1, marginTop: 12 }}>
            #{String(rank).padStart(2,'0')}
          </div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'rgba(255,255,255,.5)', letterSpacing: '.12em', marginTop: 6 }}>
            IN {ikey.toUpperCase()}
          </div>
        </div>
        <div className="insight-text">
          {getInsight()}
        </div>
      </div>

      {/* Detail grid */}
      <div className="co-detail-grid">
        <div className="panel panel-chart">
          <div className="panel-title">매출 추이</div>
          <div className="panel-sub">Revenue & operating profit · 2021–2025E</div>
          <div style={{ height: 320 }}>
            <canvas ref={chartLineRef}></canvas>
          </div>
        </div>
        <div className="panel panel-stat">
          {(() => {
            const latestRev = r25 || r24;
            const latestProfit = r25 ? p25 : p24;
            const latestYear = r25 ? '2025E' : '2024';
            const latestMargin = latestRev && latestProfit != null ? (latestProfit / latestRev * 100) : m24;
            const latestGrowth = r25 && r24 ? ((r25 - r24) / r24 * 100) : g24;
            return (<>
              <div className="big-stat">
                <span className="big-stat-val" style={{ color }}>{fmtKRW(latestRev)}</span>
                <span className="big-stat-lbl">{latestYear} 매출</span>
              </div>
              {latestProfit != null && (
                <div className="big-stat">
                  <span className={'big-stat-val ' + (latestProfit >= 0 ? 'pos' : 'neg')}>{fmtKRW(latestProfit)}</span>
                  <span className="big-stat-lbl">{latestYear} 영업이익</span>
                </div>
              )}
              {latestMargin != null && (
                <div className="big-stat">
                  <span className="big-stat-val">{latestMargin.toFixed(1)}%</span>
                  <span className="big-stat-lbl">영업이익률</span>
                </div>
              )}
              {latestGrowth != null && (
                <div className="big-stat">
                  <span className={'big-stat-val ' + (latestGrowth >= 0 ? 'pos' : 'neg')}>{fmtPct(latestGrowth, true)}</span>
                  <span className="big-stat-lbl">전년 대비 성장</span>
                </div>
              )}
            </>);
          })()}
        </div>

        <div className="panel panel-chart">
          <div className="panel-title">매출 vs 영업이익</div>
          <div className="panel-sub">Year-by-year comparison</div>
          <div style={{ height: 320 }}>
            <canvas ref={chartBarRef}></canvas>
          </div>
        </div>

        <div className="panel panel-stat">
          {company.employees && (
            <div className="big-stat">
              <span className="big-stat-val">{fmtNum(company.employees)}</span>
              <span className="big-stat-lbl">직원 수</span>
            </div>
          )}
          {company.revenuePerEmployee != null && (
            <div className="big-stat">
              <span className="big-stat-val">{company.revenuePerEmployee.toFixed(1)}억</span>
              <span className="big-stat-lbl">1인당 매출</span>
            </div>
          )}
          {company.founded && (
            <div className="big-stat">
              <span className="big-stat-val">{company.age}년</span>
              <span className="big-stat-lbl">업력 · since {company.founded}</span>
            </div>
          )}
          <div className="big-stat">
            <span className="big-stat-val" style={{ fontSize: 28 }}>{String(rank)}/{d.count}</span>
            <span className="big-stat-lbl">{ikey} 내 순위</span>
          </div>
        </div>

        {/* 주가 차트 패널 */}
        {stockInfo && Object.keys(stockInfo.monthlyPrices||{}).length > 0 && (<>
          <div className="panel panel-chart">
            <div className="panel-title">주가 추이</div>
            <div className="panel-sub">월별 종가 기준 · {Object.keys(stockInfo.monthlyPrices)[0].slice(0,4)}–{Object.keys(stockInfo.monthlyPrices).slice(-1)[0].slice(0,4)}</div>
            <div style={{ height: 300, position: 'relative' }}>
              <canvas ref={chartStockRef}></canvas>
            </div>
          </div>
          <div className="panel panel-stat">
            {stockInfo.marketCap && (
              <div className="big-stat">
                <span className="big-stat-val" style={{ color }}>{fmtKRW(stockInfo.marketCap)}</span>
                <span className="big-stat-lbl">시가총액 (2026 기준)</span>
              </div>
            )}
            <div className="big-stat">
              <span className="big-stat-val">{stockInfo.per != null ? stockInfo.per + '배' : 'N/A'}</span>
              <span className="big-stat-lbl">PER</span>
            </div>
            {threeYearReturn != null && (
              <div className="big-stat">
                <span className="big-stat-val" style={{ color: parseFloat(threeYearReturn) >= 0 ? '#1d6a3a' : '#b5321a' }}>
                  {parseFloat(threeYearReturn) >= 0 ? '+' : ''}{threeYearReturn}%
                </span>
                <span className="big-stat-lbl">최근 3년 주가 상승률</span>
              </div>
            )}
            {latestSalary && (
              <div className="big-stat">
                <span className="big-stat-val">{(latestSalary/10000).toFixed(1)}천만원</span>
                <span className="big-stat-lbl">임원 평균 연봉 ({latestSalaryYear})</span>
              </div>
            )}
          </div>
        </>)}

        <div className="panel panel-rank">
          <div className="panel-title">산업 내 매출 순위</div>
          <div className="panel-sub">{ikey} · 상위 12개사 · {cname} 강조</div>
          <div style={{ height: 380 }}>
            <canvas ref={chartRankRef}></canvas>
          </div>
        </div>
      </div>

      {/* Related companies — same industry */}
      <section style={{ marginTop: 40 }}>
        <div className="sh">
          <div className="sh-left">
            <span className="sh-num">→</span>
            <h2 className="sh-title" style={{ fontSize: 22 }}>같은 산업, 다른 이야기</h2>
          </div>
          <span className="sh-sub">Related · {ikey}</span>
        </div>
        <div className="co-grid">
          {sorted.filter(c => c.name !== cname).slice(0, 6).map((c, i) => {
            const m = calcMargin(c);
            const g = calcGrowth(c);
            return (
              <article key={c.name} className="co-card"
                style={{ '--ind-color': color }}
                onClick={() => setView({ name: 'company', industry: ikey, company: c.name })}>
                <div>
                  <div className="co-card-name">{c.name}</div>
                  <div className="co-card-sub">{c.industry || desc[ikey]}</div>
                </div>
                <div>
                  <div className="co-card-rev">{fmtKRW(c.revenue['2024'])}</div>
                  <div className="co-card-rev-lbl">2024 매출</div>
                </div>
                <div className="co-card-meta">
                  {m != null && <span className={'margin ' + (m < 0 ? 'neg' : '')}>이익률 {m.toFixed(1)}%</span>}
                  {g != null && <span>{fmtPct(g, true)}</span>}
                </div>
              </article>
            );
          })}
        </div>
      </section>
    </div>
  );
}

window.CompanyView = CompanyView;
</script>
<script type="text/babel">// ── 한국 지역별 기업 분포 지도 ──
let _korTopo = null;
function KoreaRegionMap({ data, setView }) {
  const svgRef  = useRef(null);
  const wrapRef = useRef(null);
  const [isMob, setIsMob]   = React.useState(typeof window !== 'undefined' && window.innerWidth < 560);
  const [selId, setSelId]   = React.useState(null);
  const [hpReg, setHpReg]   = React.useState(null);
  const [hpPos, setHpPos]   = React.useState({x:0,y:0});

  const REGION_DEFS = [
    { id:'seoul',    name:'서울', coords:[126.978,37.566], side:'L', dcy:185, color:'#D85A30', match: l => l.startsWith('서울') },
    { id:'gyeonggi', name:'경기', coords:[127.200,37.250], side:'R', dcy:185, color:'#1D9E75', match: l => l.startsWith('경기도') },
    { id:'incheon',  name:'인천', coords:[126.705,37.456], side:'L', dcy:270, color:'#7F77DD', match: l => l.startsWith('인천') },
    { id:'busan',    name:'부산', coords:[129.075,35.180], side:'R', dcy:268, color:'#378ADD', match: l => l.startsWith('부산') },
    { id:'gwangju',  name:'광주', coords:[126.852,35.160], side:'L', dcy:358, color:'#0F6E56', match: l => l.startsWith('광주') },
    { id:'daegu',    name:'대구', coords:[128.601,35.871], side:'R', dcy:355, color:'#BA7517', match: l => l.startsWith('대구') },
    { id:'daejeon',  name:'대전', coords:[127.385,36.351], side:'R', dcy:432, color:'#993556', match: l => l.startsWith('대전') },
    { id:'jeonbuk',  name:'전북', coords:[127.100,35.820], side:'L', dcy:438, color:'#3B6D11', match: l => l.startsWith('전북') },
    { id:'jeonnam',  name:'전남', coords:[126.700,34.650], side:'L', dcy:510, color:'#639922', match: l => l.startsWith('전남') },
    { id:'gangwon',  name:'강원', coords:[128.200,37.500], side:'R', dcy:140, color:'#0F6E56', match: l => l.startsWith('강원도') },
    { id:'chungnam', name:'충남', coords:[126.800,36.500], side:'L', dcy:340, color:'#534AB7', match: l => l.startsWith('충남') || l.startsWith('세종') },
    { id:'chungbuk', name:'충북', coords:[127.700,36.800], side:'R', dcy:235, color:'#BA7517', match: l => l.startsWith('충북') || l.startsWith('충청') },
    { id:'gyeongbuk',name:'경북', coords:[128.700,36.200], side:'R', dcy:310, color:'#6B3A1A', match: l => l.startsWith('경북') },
    { id:'gyeongnam',name:'경남', coords:[128.200,35.400], side:'R', dcy:500, color:'#A32D2D', match: l => l.startsWith('경남') },
    { id:'ulsan',    name:'울산', coords:[129.312,35.539], side:'R', dcy:432, color:'#993556', match: l => l.startsWith('울산') },
    { id:'jeju',     name:'제주', coords:[126.543,33.499], side:'L', dcy:510, color:'#185FA5', match: l => l.startsWith('제주') },
  ];

  const regionStats = useMemo(() => {
    const allCos = [];
    Object.keys(data).forEach(ind => {
      data[ind].companies.forEach(c => allCos.push({...c, _ind: ind}));
    });
    return REGION_DEFS.map(rd => {
      const cos = allCos.filter(c => rd.match(c.location || ''));
      if (!cos.length) return null;
      const sorted = [...cos].sort((a,b) => (b.revenue?.['2024']||0)-(a.revenue?.['2024']||0));
      const totalRev = cos.reduce((s,c) => s+(c.revenue?.['2024']||0), 0);
      const ldr = sorted.slice(0,2).map(c=>c.name).join(' · ');
      const top = sorted.slice(0,10).map(c => ({ n:c.name, r:fmtKRW(c.revenue?.['2024']||0) }));
      return { ...rd, count:cos.length, totalRev, rev:fmtKRW(totalRev), ldr, top };
    }).filter(Boolean);
  }, [data]);

  useEffect(() => {
    const check = () => { if(wrapRef.current) setIsMob(wrapRef.current.getBoundingClientRect().width < 560); };
    check();
    const ro = new ResizeObserver(check);
    if(wrapRef.current) ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    if (!svgRef.current || !regionStats.length) return;
    const el = svgRef.current;
    const DARK = matchMedia('(prefers-color-scheme: dark)').matches;
    if (!window.d3) return;
    const d3s = window.d3;

    const MOB = isMob;
    const VW = MOB ? 360 : 900;
    const SC = MOB ? 2800 : 3200, TX = MOB ? 210 : 450, TY_BASE = MOB ? 200 : 260;
    const CX = 128.0, CY = MOB ? 36.3 : 36.5;
    const CW = 163, CH = 76, GAP = 7;

    // 데스크탑: 카드 수에 따라 SVG 높이 동적 계산
    const L = regionStats.filter(r=>r.side==='L');
    const R = regionStats.filter(r=>r.side==='R');
    const maxCards = Math.max(L.length, R.length);
    const PAD_TOP = 28, PAD_BOT = 24;
    const minH = PAD_TOP + maxCards*(CH+GAP) - GAP + PAD_BOT;
    const VH = MOB ? 448 : Math.max(580, minH);
    // 지도 y중심을 SVG 중상단에 고정
    const TY = MOB ? TY_BASE : Math.round(VH * 0.42);

    const proj = d3s.geoMercator().center([CX,CY]).scale(SC).translate([TX,TY]);
    const gpath= d3s.geoPath().projection(proj);
    const rFn  = c => MOB ? Math.max(12, 6+Math.sqrt(c)*1.1) : Math.max(9, 7+Math.sqrt(c)*1.35);

    const pFill  = DARK?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
    const pStroke= DARK?'rgba(255,255,255,.15)':'rgba(0,0,0,.15)';
    const cFill  = DARK?'rgba(255,255,255,.06)':'rgba(0,0,0,.03)';
    const cStroke= DARK?'rgba(255,255,255,.13)':'rgba(0,0,0,.1)';
    const tPri   = DARK?'#e8e4de':'#1a1a1a';
    const tSec   = DARK?'rgba(255,255,255,.45)':'#6B7280';
    const tMid   = DARK?'rgba(255,255,255,.68)':'#374151';
    const lblBg  = DARK?'rgba(18,18,18,0.88)':'rgba(255,255,255,0.92)';

    el.setAttribute('viewBox',`0 0 ${VW} ${VH}`);

    function svgEl(tag,attrs){
      const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
      Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));
      return e;
    }
    function addTxt(p,txt,x,y,sz,fill,fw=400,anchor='start',opa=1){
      const t=svgEl('text',{x,y,'font-size':sz,fill,
        'font-weight':fw,'dominant-baseline':'middle','pointer-events':'none'});
      if(anchor!=='start') t.setAttribute('text-anchor',anchor);
      if(opa<1) t.setAttribute('opacity',opa);
      t.textContent=txt; p.appendChild(t); return t;
    }

    // 카드 y좌표 충돌 없이 자동 배치
    function resolveCardY(group) {
      if(!group.length) return;
      const pos2={};
      regionStats.forEach(r=>{ pos2[r.id]=proj(r.coords); });
      group.sort((a,b)=>pos2[a.id][1]-pos2[b.id][1]);
      // 1차: 버블 y 기준 배치
      group.forEach(r=>{
        r._cy = Math.max(PAD_TOP+CH/2, Math.min(VH-PAD_BOT-CH/2, pos2[r.id][1]));
      });
      // 2차: 겹침 해소 (아래로 밀기)
      for(let i=1;i<group.length;i++){
        const minCy=group[i-1]._cy+CH+GAP;
        if(group[i]._cy<minCy) group[i]._cy=minCy;
      }
      // 3차: 하단 초과 시 전체 위로 이동
      const last=group[group.length-1];
      const maxCy=VH-PAD_BOT-CH/2;
      if(last._cy>maxCy){
        const shift=last._cy-maxCy;
        group.forEach(r=>r._cy-=shift);
      }
    }

    function drawAll(features) {
      while(el.firstChild) el.removeChild(el.firstChild);
      if(features){
        const g=svgEl('g');
        features.forEach(f=>{
          const p=svgEl('path',{d:gpath(f)||'',fill:pFill,stroke:pStroke,'stroke-width':'0.6'});
          g.appendChild(p);
        });
        el.appendChild(g);
      }

      const pos={};
      regionStats.forEach(r=>{ pos[r.id]=proj(r.coords); });

      if(!MOB){
        resolveCardY(L);
        resolveCardY(R);

        // 연결선 (bezier)
        const lg=svgEl('g'); lg.setAttribute('opacity','0.5'); el.appendChild(lg);
        regionStats.forEach(r=>{
          const[bx,by]=pos[r.id];
          const cx=r.side==='L'?164:736, cy=r._cy;
          const mx=(cx+bx)/2;
          const p=svgEl('path',{d:`M${cx},${cy} C${mx},${cy} ${mx},${by} ${bx},${by}`,
            fill:'none',stroke:r.color,'stroke-width':'1','stroke-dasharray':'5,3'});
          lg.appendChild(p);
        });

        // 카드
        regionStats.forEach(r=>{
          const x=r.side==='L'?3:737, y=r._cy-CH/2;
          const g=svgEl('g'); g.style.cursor='pointer';
          g.appendChild(svgEl('rect',{x,y,width:CW,height:CH,rx:7,fill:cFill,stroke:cStroke,'stroke-width':'0.5'}));
          // 상단 컬러 라인
          g.appendChild(svgEl('line',{x1:x+7,y1:y,x2:x+CW-7,y2:y,stroke:r.color,'stroke-width':'1.5',opacity:'0.75'}));
          // 컬러 닷 + 지역명
          g.appendChild(svgEl('circle',{cx:x+13,cy:y+17,r:5,fill:r.color}));
          addTxt(g,r.name,x+25,y+17,13,tPri,500);
          // 기업수 · 매출
          addTxt(g,`${r.count}개사  ·  ${r.rev}`,x+9,y+35,10,tSec);
          // 대표기업 (긴 텍스트 잘림 방지)
          const ldrShort = r.ldr.length>18 ? r.ldr.slice(0,17)+'…' : r.ldr;
          addTxt(g,ldrShort,x+9,y+54,11,tMid);
          // 연결점
          const ex=r.side==='L'?x+CW:x;
          g.appendChild(svgEl('circle',{cx:ex,cy:r._cy,r:3,fill:r.color,opacity:'0.85'}));
          g.addEventListener('mousemove',ev=>{
            const wr=wrapRef.current.getBoundingClientRect();
            setHpPos({x:ev.clientX-wr.left+14,y:ev.clientY-wr.top-30});
            setHpReg(r);
          });
          g.addEventListener('mouseleave',()=>setHpReg(null));
          el.appendChild(g);
        });
      }

      // 버블 (항상 라벨 표시)
      regionStats.forEach(r=>{
        const[bx,by]=pos[r.id]; const rad=rFn(r.count);
        const g=svgEl('g'); g.setAttribute('transform',`translate(${bx},${by})`); g.style.cursor='pointer';
        g.appendChild(svgEl('circle',{r:rad+5,fill:r.color,opacity:'0.07'}));
        g.appendChild(svgEl('circle',{r:rad,fill:r.color+(DARK?'38':'28'),stroke:r.color,'stroke-width':MOB?'2':'2'}));

        if(rad>=20){
          // 버블 안에 지역명 + 기업수
          addTxt(g,r.name,0,rad>28?-6:0,Math.min(rad*0.48,13),r.color,600,'middle');
          if(rad>28) addTxt(g,r.count+'개',0,9,9,r.color,400,'middle',0.8);
        } else {
          // 버블 밖 라벨 (배경 박스 포함)
          const fs=Math.max(9, Math.min(rad*0.55, 11));
          const lw=r.name.length*fs*0.62+10;
          const lh=fs+6;
          const ly=rad+lh/2+4;
          g.appendChild(svgEl('rect',{x:-lw/2,y:ly-lh/2,width:lw,height:lh,rx:3,
            fill:lblBg,stroke:r.color,'stroke-width':'0.5','pointer-events':'none'}));
          addTxt(g,r.name,0,ly,fs,r.color,600,'middle');
        }

        if(!MOB){
          const edx=r.side==='L'?-rad:rad;
          g.appendChild(svgEl('circle',{cx:edx,cy:0,r:'2.5',fill:r.color}));
          g.addEventListener('mousemove',ev=>{
            const wr=wrapRef.current.getBoundingClientRect();
            setHpPos({x:ev.clientX-wr.left+14,y:ev.clientY-wr.top-30});
            setHpReg(r);
          });
          g.addEventListener('mouseleave',()=>setHpReg(null));
        } else {
          g.addEventListener('click',()=>setSelId(prev=>prev===r.id?null:r.id));
        }
        el.appendChild(g);
      });
    }

    let cancelled = false;
    if(_korTopo){ drawAll(topojson.feature(_korTopo,Object.values(_korTopo.objects)[0]).features); }
    else {
      fetch('https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/kor.topo.json')
        .then(r=>r.json()).then(topo=>{ if(!cancelled){ _korTopo=topo; drawAll(topojson.feature(topo,Object.values(topo.objects)[0]).features); }})
        .catch(()=>{ if(!cancelled) drawAll(null); });
    }
    return () => { cancelled = true; };
  }, [regionStats, isMob]);

  const selReg = selId ? regionStats.find(r=>r.id===selId) : null;

  return (
    <div ref={wrapRef} style={{ position:'relative' }}>
      <svg ref={svgRef} style={{ width:'100%', display:'block' }} />

      {/* 모바일 칩 스트립 */}
      {isMob && (
        <div style={{ display:'flex', flexDirection:'row', gap:7, padding:'10px 4px 4px', overflowX:'auto', scrollbarWidth:'none' }}>
          {regionStats.map(r=>(
            <div key={r.id} onClick={()=>setSelId(prev=>prev===r.id?null:r.id)}
              style={{ display:'inline-flex', alignItems:'center', gap:5, borderRadius:20,
                padding:'5px 11px 5px 8px', cursor:'pointer', whiteSpace:'nowrap', flexShrink:0,
                background:'var(--paper-3)', border:`${selId===r.id?'1.5px':'0.5px'} solid ${selId===r.id?r.color:'var(--rule)'}` }}>
              <div style={{ width:8, height:8, borderRadius:'50%', background:r.color, flexShrink:0 }}></div>
              <span style={{ fontSize:12, fontWeight:500, color:'var(--ink)' }}>{r.name}</span>
              <span style={{ fontSize:10, color:'var(--ink-mute)' }}>{r.count}개</span>
            </div>
          ))}
        </div>
      )}

      {/* 모바일 상세 패널 */}
      {isMob && selReg && (
        <div style={{ margin:'8px 4px 0', background:'var(--paper-3)', border:'0.5px solid var(--rule)',
          borderRadius:'var(--radius-lg,12px)', padding:'14px 14px 10px', animation:'fadeUp .2s ease' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:3 }}>
            <div style={{ display:'flex', alignItems:'center', gap:7 }}>
              <div style={{ width:10, height:10, borderRadius:'50%', background:selReg.color }}></div>
              <span style={{ fontSize:14, fontWeight:500, color:'var(--ink)' }}>{selReg.name} 주요 기업</span>
            </div>
            <span onClick={()=>setSelId(null)} style={{ fontSize:18, color:'var(--ink-mute)', cursor:'pointer', lineHeight:1, padding:'0 2px' }}>×</span>
          </div>
          <div style={{ fontSize:11, color:'var(--ink-mute)', marginBottom:10, paddingBottom:8, borderBottom:'0.5px solid var(--rule)' }}>
            {selReg.count}개사 · 추정 총매출 {selReg.rev}
          </div>
          {selReg.top.map((c,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', gap:8, fontSize:12,
              padding:'4px 0', borderBottom:'0.5px solid var(--rule)' }}>
              <span style={{ fontSize:10, color:'var(--ink-mute)', minWidth:14, textAlign:'right' }}>{i+1}</span>
              <span style={{ flex:1, color:'var(--ink)', cursor:'pointer' }}
                onClick={()=>setView&&setView({name:'company',key:c.n})}>{c.n}</span>
              <span style={{ fontSize:10, color:'var(--ink-mute)', whiteSpace:'nowrap' }}>{c.r}</span>
            </div>
          ))}
        </div>
      )}

      {/* 데스크탑 호버 패널 */}
      {!isMob && hpReg && (
        <div style={{ position:'absolute', left:Math.min(hpPos.x, 660), top:Math.max(4,hpPos.y),
          background:'var(--paper)', border:'0.5px solid var(--rule)', borderRadius:'var(--radius-lg,12px)',
          padding:'14px 16px', minWidth:218, pointerEvents:'none', zIndex:40 }}>
          <div style={{ fontSize:13, fontWeight:500, color:'var(--ink)', marginBottom:2 }}>{hpReg.name} 주요 기업</div>
          <div style={{ fontSize:11, color:'var(--ink-mute)', marginBottom:9, paddingBottom:8, borderBottom:'0.5px solid var(--rule)' }}>
            {hpReg.count}개사 · 추정 매출 {hpReg.rev}
          </div>
          {hpReg.top.map((c,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', gap:7, fontSize:12,
              padding:'3px 0', borderBottom:'0.5px solid var(--rule)' }}>
              <span style={{ fontSize:10, color:'var(--ink-mute)', minWidth:14, textAlign:'right' }}>{i+1}</span>
              <span style={{ flex:1, color:'var(--ink)' }}>{c.n}</span>
              <span style={{ fontSize:10, color:'var(--ink-mute)', whiteSpace:'nowrap' }}>{c.r}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
window.KoreaRegionMap = KoreaRegionMap;
</script>
