<script type="text/babel">// Brand positioning map — D3 scatter plot with filters
function IndustryBubbleMap({ data, colors, setView }) {
  const svgRef = useRef(null);
  const ttRef  = useRef(null);

  const industryStats = useMemo(() => {
    return Object.keys(data).map(k => {
      const co = data[k].companies || [];
      const margins = co.map(c => calcMargin(c)).filter(m => m != null);
      const avgMargin = margins.length ? margins.reduce((s,m)=>s+m,0)/margins.length : 0;
      return { key: k, label: k, revenue: data[k].total2024, avgMargin, count: data[k].count };
    }).filter(d => d.revenue > 0);
  }, [data]);

  useEffect(() => {
    if (!svgRef.current || !industryStats.length) return;
    const el  = svgRef.current;
    const W   = el.getBoundingClientRect().width || 800;
    const mob = W < 500;
    const H   = mob ? 340 : 460;
    const mg  = mob ? { top: 24, right: 12, bottom: 56, left: 48 }
                    : { top: 32, right: 32, bottom: 64, left: 64 };
    const iw  = W - mg.left - mg.right;
    const ih  = H - mg.top - mg.bottom;

    const svg = d3.select(el);
    svg.selectAll('*').remove();
    svg.attr('height', H);
    const g = svg.append('g').attr('transform', `translate(${mg.left},${mg.top})`);

    // 스케일 — y축 고정 -30%~+30%, x축 로그 스케일로 균형감 유지
    const Y_MIN = -30, Y_MAX = 30;
    const xExt = d3.extent(industryStats, d => d.revenue);
    const xScale = d3.scaleLog()
      .domain([Math.max(1, xExt[0] * 0.5), xExt[1] * 1.4])
      .range([0, iw])
      .nice();
    const yScale = d3.scaleLinear().domain([Y_MIN, Y_MAX]).range([ih, 0]);
    const rScale = d3.scaleSqrt().domain([0, d3.max(industryStats, d => d.count)])
                    .range(mob ? [7, 20] : [10, 30]);

    // 클램프된 y값 (그래프 끝에 고정)
    const clampY = v => Math.max(Y_MIN, Math.min(Y_MAX, v));

    // 축 (로그 스케일용 tick 값 사용)
    const xTicks = makeRevTickValues(xScale.domain()[0], xScale.domain()[1]);
    g.append('g').attr('transform', `translate(0,${ih})`).call(
      d3.axisBottom(xScale).tickValues(xTicks).tickFormat(d => fmtKRW(d))
    ).call(ax => {
      ax.selectAll('text').attr('fill','#6B7280').attr('font-size', mob?9:11)
        .style('text-anchor','end').attr('dx','-0.4em').attr('dy','0.5em').attr('transform','rotate(-30)');
    });
    g.append('g').call(
      d3.axisLeft(yScale).ticks(mob ? 5 : 7).tickFormat(d => d + '%')
    ).call(ax => ax.selectAll('text').attr('fill','#6B7280').attr('font-size', mob?9:11));

    // 격자선 (가로)
    [-20, -10, 0, 10, 20].forEach(v => {
      g.append('line').attr('x1', 0).attr('x2', iw)
        .attr('y1', yScale(v)).attr('y2', yScale(v))
        .attr('stroke', v === 0 ? '#9CA3AF' : '#E5E7EB')
        .attr('stroke-dasharray', v === 0 ? '4,3' : '2,4')
        .attr('stroke-width', v === 0 ? 1.5 : 1);
    });

    // 클립 패스 (버블이 그래프 밖으로 나가지 않도록)
    svg.append('defs').append('clipPath').attr('id','bbl-clip')
      .append('rect').attr('x', mg.left).attr('y', mg.top).attr('width', iw).attr('height', ih);

    // 축 라벨
    g.append('text').attr('x', iw/2).attr('y', ih+38)
      .attr('text-anchor','middle').attr('font-size', mob?9:11).attr('fill','#6B7280')
      .text('2024 총매출 (로그 스케일)');
    g.append('text').attr('transform',`translate(${mob?-42:-52},${ih/2}) rotate(-90)`)
      .attr('text-anchor','middle').attr('font-size', mob?9:11).attr('fill','#6B7280')
      .text('평균 영업이익률 (%)');

    // Force simulation — 버블이 서로 겹치지 않게 밀어냄
    const simNodes = industryStats.map(d => {
      const clamped = clampY(d.avgMargin);
      const isClamped = d.avgMargin !== clamped;
      return {
        ...d,
        displayMargin: clamped,
        isClamped,
        tx: xScale(d.revenue),
        ty: yScale(clamped),
        x:  xScale(d.revenue),
        y:  yScale(clamped),
        r:  rScale(d.count),
      };
    });

    const sim = d3.forceSimulation(simNodes)
      .force('x', d3.forceX(d => d.tx).strength(0.7))
      .force('y', d3.forceY(d => d.ty).strength(0.9))
      .force('collide', d3.forceCollide(d => d.r + (mob ? 3 : 5)).strength(0.85))
      .stop();

    // 동기 실행 (애니메이션 없이 최종 위치 계산)
    for (let i = 0; i < 300; i++) sim.tick();

    // y값 경계 내 클램프 (버블이 그래프 밖으로 나가지 않게)
    simNodes.forEach(d => {
      d.x = Math.max(d.r, Math.min(iw - d.r, d.x));
      d.y = Math.max(d.r, Math.min(ih - d.r, d.y));
    });

    // 버블
    const tt = d3.select(ttRef.current);
    const bbl = g.selectAll('.bbl').data(simNodes).enter().append('g')
      .attr('class','bbl')
      .attr('transform', d => `translate(${d.x},${d.y})`);

    bbl.append('circle')
      .attr('r', d => d.r)
      .attr('fill', d => (colors[d.key]||'#64748B') + '40')
      .attr('stroke', d => colors[d.key]||'#64748B')
      .attr('stroke-width', mob ? 1.5 : 2)
      .style('cursor','pointer')
      .style('cursor', 'pointer')
      .on('click', function(ev, d) {
        if (setView) setView({ name: 'industry', key: d.key });
      })
      .on('mousemove', function(ev, d) {
        const rect = el.getBoundingClientRect();
        tt.classed('on', true)
          .style('left', (ev.clientX - rect.left) + 'px')
          .style('top',  (ev.clientY - rect.top - 70) + 'px')
          .html(`<b>${d.label}</b><div class="tt-row"><span>총매출</span><span>${fmtKRW(d.revenue)}</span></div><div class="tt-row"><span>이익률</span><span>${d.avgMargin.toFixed(1)}%${d.isClamped ? ' ▲' : ''}</span></div><div class="tt-row"><span>기업수</span><span>${d.count}개</span></div><div class="tt-row" style="margin-top:6px;color:#9CA3AF;font-size:10px"><span>클릭하여 산업 페이지로 →</span></div>`);
      })
      .on('mouseleave', () => tt.classed('on', false));

    // 클램프된 버블에 테두리 강조 표시
    bbl.filter(d => d.isClamped)
      .append('circle')
      .attr('r', d => d.r + 3)
      .attr('fill', 'none')
      .attr('stroke', d => colors[d.key]||'#64748B')
      .attr('stroke-width', 1)
      .attr('stroke-dasharray', '3,2')
      .attr('opacity', 0.5);

    // 라벨 (줄바꿈, 배경 흰색)
    const fs = mob ? 9 : 11;
    bbl.each(function(d) {
      const ng = d3.select(this);
      const parts = d.label.split('·').map(s => s.trim());
      const lineH = fs + 2;
      const totalH = parts.length * lineH;
      const yStart = -(totalH / 2) + fs * 0.4;
      // 텍스트
      parts.forEach((p, i) => {
        ng.append('text')
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('y', yStart + i * lineH)
          .attr('font-size', fs).attr('font-weight', 700)
          .attr('fill', colors[d.key]||'#1F2937')
          .attr('pointer-events','none')
          .text(p);
      });
    });

  }, [industryStats, colors]);

  return (
    <div style={{ position: 'relative' }}>
      <svg ref={svgRef} style={{ width: '100%', overflow: 'visible' }}></svg>
      <div ref={ttRef} className="map-tooltip"></div>
    </div>
  );
}

function PositioningMap({ data, colors, desc, setView }) {
  const svgRef = useRef(null);
  const tooltipRef = useRef(null);
  const [activeInds, setActiveInds] = useState(() => new Set(Object.keys(data)));
  const [xMetric, setXMetric] = useState('revenue'); // revenue | employees | rpe
  const [yMetric, setYMetric] = useState('margin'); // margin | growth

  const industries = Object.keys(data);

  // Flatten companies with industry
  const allCompanies = useMemo(() => {
    const arr = [];
    industries.forEach(ikey => {
      data[ikey].companies.forEach(c => arr.push({ ...c, _ind: ikey }));
    });
    return arr;
  }, [data]);

  const getX = (c) => {
    if (xMetric === 'revenue') return c.revenue?.['2024'];
    if (xMetric === 'employees') return c.employees;
    if (xMetric === 'rpe') return c.revenuePerEmployee;
  };
  const getY = (c) => {
    if (yMetric === 'margin') return calcMargin(c);
    if (yMetric === 'growth') return calcGrowth(c);
  };
  const xLabel = { revenue: '매출 (억원 · 로그)', employees: '직원 수 (로그)', rpe: '1인당 매출 (억)' }[xMetric];
  const yLabel = { margin: '영업이익률 (%)', growth: '매출 성장률 (%)' }[yMetric];

  useEffect(() => {
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const bbox = svgRef.current.getBoundingClientRect();
    const W = bbox.width, H = bbox.height;
    const margin = { top: 40, right: 30, bottom: xMetric === 'revenue' ? 72 : 60, left: 70 };
    const iw = W - margin.left - margin.right;
    const ih = H - margin.top - margin.bottom;

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    // filter
    const points = allCompanies
      .map(c => ({ ...c, _x: getX(c), _y: getY(c) }))
      .filter(p => p._x != null && p._y != null && p._x > 0 && isFinite(p._x) && isFinite(p._y));

    if (!points.length) return;

    // scales
    const xScale = (xMetric === 'revenue' || xMetric === 'employees')
      ? d3.scaleLog().domain([Math.max(1, d3.min(points, d => d._x)), d3.max(points, d => d._x)]).range([0, iw]).nice()
      : d3.scaleLinear().domain(d3.extent(points, d => d._x)).range([0, iw]).nice();
    const yExtent = d3.extent(points, d => d._y);
    const yPad = (yExtent[1] - yExtent[0]) * 0.1;
    const yDomain = yMetric === 'margin' ? [Math.max(-30, yExtent[0]-5), Math.min(100, yExtent[1]+5)] : [Math.max(-50, yExtent[0]-yPad), Math.min(200, yExtent[1]+yPad)];
    const yScale = d3.scaleLinear().domain(yDomain).range([ih, 0]).nice();

    // quadrants — zero line & median
    const yZero = yMetric === 'margin' ? 0 : 0;
    const xMid = d3.median(points, d => d._x);

    g.append('line').attr('x1', 0).attr('x2', iw)
      .attr('y1', yScale(yZero)).attr('y2', yScale(yZero))
      .attr('stroke', '#131210').attr('stroke-dasharray', '3,3').attr('stroke-opacity', .3);
    g.append('line').attr('x1', xScale(xMid)).attr('x2', xScale(xMid))
      .attr('y1', 0).attr('y2', ih)
      .attr('stroke', '#131210').attr('stroke-dasharray', '3,3').attr('stroke-opacity', .3);

    // quadrant labels
    const qLabels = yMetric === 'margin' ? [
      { x: 0.02, y: 0.04, t: 'Q1. 소규모 · 고마진' },
      { x: 0.76, y: 0.04, t: 'Q2. 대형 · 고마진' },
      { x: 0.76, y: 0.94, t: 'Q3. 대형 · 저마진' },
      { x: 0.02, y: 0.94, t: 'Q4. 소규모 · 저마진' },
    ] : [];
    g.selectAll('.qlabel').data(qLabels).enter().append('text')
      .attr('class', 'map-quadrant-label')
      .attr('x', d => d.x * iw).attr('y', d => d.y * ih)
      .text(d => d.t);

    // axes
    let xAxisGen;
    if (xMetric === 'revenue') {
      const rvTicks = makeRevTickValues(...xScale.domain());
      xAxisGen = d3.axisBottom(xScale).tickValues(rvTicks).tickFormat(d => fmtKRW(d));
    } else if (xMetric === 'employees') {
      xAxisGen = d3.axisBottom(xScale).ticks(5, d3.format('~s'));
    } else {
      xAxisGen = d3.axisBottom(xScale).ticks(6);
    }
    const yAxis = d3.axisLeft(yScale).ticks(6).tickFormat(d => d + (yMetric === 'margin' || yMetric === 'growth' ? '%' : ''));

    const xAxisG = g.append('g').attr('class', 'map-axis').attr('transform', `translate(0,${ih})`).call(xAxisGen);
    if (xMetric === 'revenue') {
      xAxisG.selectAll('text')
        .style('text-anchor', 'end')
        .attr('dx', '-0.4em').attr('dy', '0.5em')
        .attr('transform', 'rotate(-30)');
    }
    g.append('g').attr('class', 'map-axis').call(yAxis);

    g.append('text').attr('class', 'map-axis-title')
      .attr('x', iw).attr('y', xMetric === 'revenue' ? ih + 54 : ih + 42).attr('text-anchor', 'end').text('→ ' + xLabel);
    g.append('text').attr('class', 'map-axis-title')
      .attr('transform', 'rotate(-90)').attr('x', 0).attr('y', -50).attr('text-anchor', 'end').text('→ ' + yLabel);

    // dots
    const dotG = g.append('g');
    const dots = dotG.selectAll('.map-dot').data(points).enter().append('circle')
      .attr('class', d => 'map-dot ' + (activeInds.has(d._ind) ? '' : 'dim'))
      .attr('cx', d => xScale(d._x))
      .attr('cy', d => yScale(d._y))
      .attr('r', d => Math.min(18, Math.max(4, Math.sqrt((d.revenue?.['2024'] || 1000) / 800))))
      .attr('fill', d => colors[d._ind])
      .attr('fill-opacity', .55)
      .attr('stroke', d => colors[d._ind])
      .attr('stroke-width', 1);

    // label top-N (visible only)
    const visible = points.filter(p => activeInds.has(p._ind));
    const topByRev = visible.slice().sort((a,b) => (b.revenue?.['2024']||0) - (a.revenue?.['2024']||0)).slice(0, 8);
    const topByMargin = visible.slice().sort((a,b) => {
      const ma = calcMargin(a) || -999, mb = calcMargin(b) || -999;
      return mb - ma;
    }).slice(0, 6);
    const toLabel = new Set([...topByRev, ...topByMargin].map(c => c.name + '__' + c._ind));
    const labelPoints = visible.filter(p => toLabel.has(p.name + '__' + p._ind));

    // collision avoidance for labels
    const labelData = labelPoints.map(d => ({
      d,
      x: xScale(d._x) + 8,
      y: yScale(d._y) + 3,
    }));
    const FONT_H = 13, CHAR_W = 7.5;
    for (let iter = 0; iter < 30; iter++) {
      for (let i = 0; i < labelData.length; i++) {
        for (let j = i + 1; j < labelData.length; j++) {
          const a = labelData[i], b = labelData[j];
          const aw = a.d.name.length * CHAR_W, bw = b.d.name.length * CHAR_W;
          const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
          if (dx < (aw + bw) / 2 + 4 && dy < FONT_H + 4) {
            const pushY = (FONT_H + 4 - dy) / 2 + 1;
            if (a.y <= b.y) { a.y -= pushY; b.y += pushY; }
            else { a.y += pushY; b.y -= pushY; }
          }
        }
      }
    }

<script type="text/babel">// Small positioning map for a single industry
function MiniMap({ ikey, data, color, onCompanyClick }) {
  const svgRef = useRef(null);
  const tooltipRef = useRef(null);

  useEffect(() => {
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();
    const bbox = svgRef.current.getBoundingClientRect();
    const W = bbox.width, H = bbox.height;
    const margin = { top: 40, right: 30, bottom: 72, left: 70 };
    const iw = W - margin.left - margin.right;
    const ih = H - margin.top - margin.bottom;

    const points = data[ikey].companies
      .map(c => ({ ...c, _x: c.revenue?.['2024'], _y: calcMargin(c) }))
      .filter(p => p._x > 0 && p._y != null && p._y > -40 && p._y < 100);
    if (!points.length) return;

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const xScale = d3.scaleLog()
      .domain([Math.max(1, d3.min(points, d => d._x)), d3.max(points, d => d._x)])
      .range([0, iw]).nice();
    const yExt = d3.extent(points, d => d._y);
    const yScale = d3.scaleLinear()
      .domain([Math.max(-30, yExt[0]-3), Math.min(80, yExt[1]+3)])
      .range([ih, 0]).nice();

    // zero line
    if (yScale.domain()[0] < 0 && yScale.domain()[1] > 0) {
      g.append('line').attr('x1', 0).attr('x2', iw)
        .attr('y1', yScale(0)).attr('y2', yScale(0))
        .attr('stroke', '#131210').attr('stroke-dasharray', '2,3').attr('stroke-opacity', .2);
    }

    // axes
    const xTicks = makeRevTickValues(...xScale.domain());
    g.append('g').attr('class', 'map-axis')
      .attr('transform', `translate(0,${ih})`)
      .call(d3.axisBottom(xScale).tickValues(xTicks).tickFormat(d => fmtKRW(d)))
      .selectAll('text')
        .style('text-anchor', 'end')
        .attr('dx', '-0.4em').attr('dy', '0.5em')
        .attr('transform', 'rotate(-30)');
    g.append('g').attr('class', 'map-axis')
      .call(d3.axisLeft(yScale).ticks(6).tickFormat(d => d + '%'));
    g.append('text').attr('class', 'map-axis-title')
      .attr('x', iw).attr('y', ih + 52).attr('text-anchor', 'end').text('→ 매출 (억원 · 로그)');
    g.append('text').attr('class', 'map-axis-title')
      .attr('transform', 'rotate(-90)').attr('x', 0).attr('y', -50).attr('text-anchor', 'end').text('→ 영업이익률 (%)');

    // dots
    const tt = d3.select(tooltipRef.current);
    const dots = g.selectAll('.map-dot').data(points).enter().append('circle')
      .attr('class', 'map-dot')
      .attr('cx', d => xScale(d._x))
      .attr('cy', d => yScale(d._y))
      .attr('r', d => Math.min(18, Math.max(4, Math.sqrt((d.revenue['2024'] || 1000)/800))))
      .attr('fill', color)
      .attr('fill-opacity', .55)
      .attr('stroke', color)
      .attr('stroke-width', 1)
      .on('mousemove', function(ev, d) {
        const rect = svgRef.current.getBoundingClientRect();
        tt.classed('on', true)
          .style('left', (ev.clientX - rect.left) + 'px')
          .style('top', (ev.clientY - rect.top) + 'px')
          .html(`<b>${d.name}</b>
            <div class="tt-row"><span>매출</span><span>${fmtKRW(d._x)}</span></div>
            <div class="tt-row"><span>이익률</span><span>${d._y.toFixed(1)}%</span></div>`);
      })
      .on('mouseleave', () => tt.classed('on', false))
      .on('click', (ev, d) => onCompanyClick(d.name));

    // label top N by revenue + top by margin
    const top = points.slice().sort((a,b) => b._x - a._x).slice(0, 8);
    const tm = points.slice().sort((a,b) => b._y - a._y).slice(0, 6);
    const toLabel = new Set([...top, ...tm].map(p => p.name));
    // collision avoidance
    const miniLabelData = points.filter(p => toLabel.has(p.name)).map(d => ({
      d, x: xScale(d._x) + 8, y: yScale(d._y) + 3,
    }));
    const ML_H = 13, ML_CW = 7.5;
    for (let iter = 0; iter < 30; iter++) {
      for (let i = 0; i < miniLabelData.length; i++) {
        for (let j = i + 1; j < miniLabelData.length; j++) {
          const a = miniLabelData[i], b = miniLabelData[j];
          const aw = a.d.name.length * ML_CW, bw = b.d.name.length * ML_CW;
          const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
          if (dx < (aw + bw) / 2 + 4 && dy < ML_H + 4) {
            const pushY = (ML_H + 4 - dy) / 2 + 1;
            if (a.y <= b.y) { a.y -= pushY; b.y += pushY; }
            else { a.y += pushY; b.y -= pushY; }
          }
        }
      }
    }
    g.selectAll('.mini-label').data(miniLabelData).enter().append('text')
      .attr('x', d => d.x).attr('y', d => d.y)
      .attr('font-family', "'Noto Sans KR', sans-serif")
      .attr('font-size', 13).attr('font-weight', 500)
      .attr('fill', '#131210').attr('pointer-events', 'none')
      .text(d => d.d.name);
  }, [ikey]);

  const d = data[ikey];
  const sorted = [...d.companies].sort((a,b) => (b.revenue['2024']||0) - (a.revenue['2024']||0));
  const withM = d.companies.map(c => calcMargin(c)).filter(m => m != null);
  const avgM = withM.reduce((s,m) => s+m, 0) / (withM.length || 1);

  return (
    <article className="mini-map-card" style={{ position: 'relative' }}>
      <div className="mini-map-head">
        <div>
          <div className="mini-map-title" style={{ color }}>{ikey}</div>
          <div className="mini-map-sub">{d.count}개사 · 평균 이익률 {avgM.toFixed(1)}%</div>
        </div>
        <div className="mini-map-total">{fmtKRW(d.total2024)}</div>
      </div>
      <svg ref={svgRef} className="mini-map-svg"></svg>
      <div ref={tooltipRef} className="map-tooltip"></div>
      <div className="mini-map-foot">
        <span>1위 · {sorted[0]?.name}</span>
        <span>{fmtKRW(sorted[0]?.revenue['2024'])}</span>
      </div>
    </article>
  );
}

window.MiniMap = MiniMap;
</script>

  "accent": "#b5321a",
  "paper": "#ffffff",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {

    try {
      const h = window.location.hash;
      if (h && h.startsWith('#v=')) return JSON.parse(decodeURIComponent(h.slice(3)));
    } catch(e) {}
    return { name: 'home' };
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAKS);

  // 뷰 변경 시 history에 push
  const navigateTo = (newView) => {
