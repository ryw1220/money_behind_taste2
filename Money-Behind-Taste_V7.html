<script type="text/babel">// Small positioning map for a single industry
function MiniMap({ ikey, data, color, onCompanyClick }) {
  const svgRef = useRef(null);
  const tooltipRef = useRef(null);

  useEffect(() => {
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();
    const bbox = svgRef.current.getBoundingClientRect();
    const W = bbox.width, H = bbox.height;
    const margin = { top: 40, right: 30, bottom: 72, left: 70 };
    const iw = W - margin.left - margin.right;
    const ih = H - margin.top - margin.bottom;

    const points = data[ikey].companies
      .map(c => ({ ...c, _x: c.revenue?.['2024'], _y: calcMargin(c) }))
      .filter(p => p._x > 0 && p._y != null && p._y > -40 && p._y < 100);
    if (!points.length) return;

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const xScale = d3.scaleLog()
      .domain([Math.max(1, d3.min(points, d => d._x)), d3.max(points, d => d._x)])
      .range([0, iw]).nice();
    const yExt = d3.extent(points, d => d._y);
    const yScale = d3.scaleLinear()
      .domain([Math.max(-30, yExt[0]-3), Math.min(80, yExt[1]+3)])
      .range([ih, 0]).nice();

    // zero line
    if (yScale.domain()[0] < 0 && yScale.domain()[1] > 0) {
      g.append('line').attr('x1', 0).attr('x2', iw)
        .attr('y1', yScale(0)).attr('y2', yScale(0))
        .attr('stroke', '#131210').attr('stroke-dasharray', '2,3').attr('stroke-opacity', .2);
    }

    // axes
    const xTicks = makeRevTickValues(...xScale.domain());
    g.append('g').attr('class', 'map-axis')
      .attr('transform', `translate(0,${ih})`)
      .call(d3.axisBottom(xScale).tickValues(xTicks).tickFormat(d => fmtKRW(d)))
      .selectAll('text')
        .style('text-anchor', 'end')
        .attr('dx', '-0.4em').attr('dy', '0.5em')
        .attr('transform', 'rotate(-30)');
    g.append('g').attr('class', 'map-axis')
      .call(d3.axisLeft(yScale).ticks(6).tickFormat(d => d + '%'));
    g.append('text').attr('class', 'map-axis-title')
      .attr('x', iw).attr('y', ih + 52).attr('text-anchor', 'end').text('→ 매출 (억원 · 로그)');
    g.append('text').attr('class', 'map-axis-title')
      .attr('transform', 'rotate(-90)').attr('x', 0).attr('y', -50).attr('text-anchor', 'end').text('→ 영업이익률 (%)');

    // dots
    const tt = d3.select(tooltipRef.current);
    const dots = g.selectAll('.map-dot').data(points).enter().append('circle')
      .attr('class', 'map-dot')
      .attr('cx', d => xScale(d._x))
      .attr('cy', d => yScale(d._y))
      .attr('r', d => Math.min(18, Math.max(4, Math.sqrt((d.revenue['2024'] || 1000)/800))))
      .attr('fill', color)
      .attr('fill-opacity', .55)
      .attr('stroke', color)
      .attr('stroke-width', 1)
      .on('mousemove', function(ev, d) {
        const rect = svgRef.current.getBoundingClientRect();
        tt.classed('on', true)
          .style('left', (ev.clientX - rect.left) + 'px')
          .style('top', (ev.clientY - rect.top) + 'px')
          .html(`<b>${d.name}</b>
            <div class="tt-row"><span>매출</span><span>${fmtKRW(d._x)}</span></div>
            <div class="tt-row"><span>이익률</span><span>${d._y.toFixed(1)}%</span></div>`);
      })
      .on('mouseleave', () => tt.classed('on', false))
      .on('click', (ev, d) => onCompanyClick(d.name));

    // label top N by revenue + top by margin
    const top = points.slice().sort((a,b) => b._x - a._x).slice(0, 8);
    const tm = points.slice().sort((a,b) => b._y - a._y).slice(0, 6);
    const toLabel = new Set([...top, ...tm].map(p => p.name));
    // collision avoidance
    const miniLabelData = points.filter(p => toLabel.has(p.name)).map(d => ({
      d, x: xScale(d._x) + 8, y: yScale(d._y) + 3,
    }));
    const ML_H = 13, ML_CW = 7.5;
    for (let iter = 0; iter < 30; iter++) {
      for (let i = 0; i < miniLabelData.length; i++) {
        for (let j = i + 1; j < miniLabelData.length; j++) {
          const a = miniLabelData[i], b = miniLabelData[j];
          const aw = a.d.name.length * ML_CW, bw = b.d.name.length * ML_CW;
          const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
          if (dx < (aw + bw) / 2 + 4 && dy < ML_H + 4) {
            const pushY = (ML_H + 4 - dy) / 2 + 1;
            if (a.y <= b.y) { a.y -= pushY; b.y += pushY; }
            else { a.y += pushY; b.y -= pushY; }
          }
        }
      }
    }
    g.selectAll('.mini-label').data(miniLabelData).enter().append('text')
      .attr('x', d => d.x).attr('y', d => d.y)
      .attr('font-family', "'Noto Sans KR', sans-serif")
      .attr('font-size', 13).attr('font-weight', 500)
      .attr('fill', '#131210').attr('pointer-events', 'none')
      .text(d => d.d.name);
  }, [ikey]);

  const d = data[ikey];
  const sorted = [...d.companies].sort((a,b) => (b.revenue['2024']||0) - (a.revenue['2024']||0));
  const withM = d.companies.map(c => calcMargin(c)).filter(m => m != null);
  const avgM = withM.reduce((s,m) => s+m, 0) / (withM.length || 1);

  return (
    <article className="mini-map-card" style={{ position: 'relative' }}>
      <div className="mini-map-head">
        <div>
          <div className="mini-map-title" style={{ color }}>{ikey}</div>
          <div className="mini-map-sub">{d.count}개사 · 평균 이익률 {avgM.toFixed(1)}%</div>
        </div>
        <div className="mini-map-total">{fmtKRW(d.total2024)}</div>
      </div>
      <svg ref={svgRef} className="mini-map-svg"></svg>
      <div ref={tooltipRef} className="map-tooltip"></div>
      <div className="mini-map-foot">
        <span>1위 · {sorted[0]?.name}</span>
        <span>{fmtKRW(sorted[0]?.revenue['2024'])}</span>
      </div>
    </article>
  );
}

window.MiniMap = MiniMap;
</script>

<script type="text/babel">// Main app shell — router & state
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "#b5321a",
  "paper": "#ffffff",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [view, setView] = useState(() => {
    // URL hash로 초기 뷰 복원
    try {
      const h = window.location.hash;
      if (h && h.startsWith('#v=')) return JSON.parse(decodeURIComponent(h.slice(3)));
    } catch(e) {}
    return { name: 'home' };
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAKS);
  // stock.json 로드 완료 여부 — CompanyView에 prop으로 전달해 강제 리렌더
  const [stockReady, setStockReady] = useState(!!window.TASTE_STOCK);
  useEffect(() => {
    if (window.TASTE_STOCK) { setStockReady(true); return; }
    const h = () => setStockReady(true);
    document.addEventListener('stockDataReady', h);
    return () => document.removeEventListener('stockDataReady', h);
  }, []);

  // 뷰 변경 시 history에 push
  const navigateTo = (newView) => {
    const encoded = encodeURIComponent(JSON.stringify(newView));
    window.history.pushState(newView, '', '#v=' + encoded);
    setView(newView);
    window.scrollTo(0, 0);
  };

  // 브라우저 뒤로가기/앞으로가기 처리
  useEffect(() => {
    const onPop = (ev) => {
      if (ev.state) {
        setView(ev.state);
        window.scrollTo(0, 0);
      } else {
        setView({ name: 'home' });
        window.scrollTo(0, 0);
      }
    };
    window.addEventListener('popstate', onPop);
    // 초기 상태 등록
    const encoded = encodeURIComponent(JSON.stringify(view));
    window.history.replaceState(view, '', '#v=' + encoded);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // edit mode
  useEffect(() => {
    const handler = (ev) => {
      if (ev.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (ev.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    document.documentElement.style.setProperty('--paper', tweaks.paper);
  }, [tweaks]);

  const data = window.TASTE_DATA;
  const colors = window.TASTE_COLORS;
  const wows = window.TASTE_WOWS;
  const desc = window.TASTE_DESC;

  const setT = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <>
      <Topbar view={view} setView={navigateTo} />
      {view.name === 'home' && <HomeView data={data} colors={colors} wows={wows} desc={desc} setView={navigateTo} />}
      {view.name === 'industry' && <IndustryView ikey={view.key} data={data} colors={colors} wows={wows} desc={desc} setView={navigateTo} />}
      {view.name === 'company' && <CompanyView ikey={view.industry} cname={view.company} data={data} colors={colors} desc={desc} setView={navigateTo} stockReady={stockReady} />}
      {view.name === 'map' && <PositioningMap data={data} colors={colors} desc={desc} setView={navigateTo} />}
      {view.name === 'localmap' && <LocalBusinessMapView data={data} setView={navigateTo} />}
      {view.name === 'story' && <StoryView data={data} colors={colors} setView={navigateTo} />}

      <footer className="footer">
        <div>
          <div className="footer-title">Money Behind Taste</div>
          <div style={{ marginTop: 6 }}>VOL.01 · 2025E · DART 공시 데이터 기반</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div>{Object.keys(data).length} INDUSTRIES · {Object.values(data).reduce((s,d) => s+d.count, 0)} COMPANIES</div>
          <div style={{ marginTop: 6 }}>DESIGNED AS AN EDITORIAL · 2026</div>
        </div>
      </footer>

      {tweaksOpen && (
        <div className="tweaks-panel">
          <h4>Tweaks</h4>
          <div className="tweaks-row">
            <label>Accent color</label>
            <input type="color" value={tweaks.accent} onChange={e => setT('accent', e.target.value)} />
          </div>
          <div className="tweaks-row">
            <label>Paper tone</label>
            <input type="color" value={tweaks.paper} onChange={e => setT('paper', e.target.value)} />
          </div>
          <div className="tweaks-row">
            <label>Quick jump</label>
            <select onChange={e => {
              const v = e.target.value;
              if (v === 'home') setView({ name: 'home' });
              else if (v === 'map') setView({ name: 'map' });
              else if (v === 'localmap') setView({ name: 'localmap' });
              else if (v === 'story') setView({ name: 'story' });
              else setView({ name: 'industry', key: v });
            }}>
              <option value="home">목차</option>
              <option value="map">비즈니스 분포도</option>
              <option value="localmap">로컬 비즈니스 맵</option>
              <option value="story">스토리</option>
              {Object.keys(data).map(k => <option key={k} value={k}>{k}</option>)}
            </select>
          </div>
        </div>
      )}
    </>
  );
}

function _mountApp() {
  const root = ReactDOM.createRoot(document.getElementById('app'));
  root.render(<App />);
}
if (window.TASTE_DATA) { _mountApp(); }
else { document.addEventListener('tasteDataReady', _mountApp); }
</script>


</body></html>
